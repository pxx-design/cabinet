<!-- ── 画布引擎（demo-d 引力场，沿用；加 pause/resume 供模式切换）── -->
<script>
(()=>{
  const DATA = window.LIBRARY;
  // 回收站里的图彻底退出布局（不进 items/归一化/感觉词重心）——重载后画面按你留下的那批重铺
  const _saved0=(()=>{ try{return JSON.parse(localStorage.getItem('lingganku.v3'))||{}}catch(e){return {}} })();
  const _trashed0=new Set(_saved0.trashed||[]);
  if(window.CABINET_DEMO) (window.DEMO_TRASHED||[]).forEach(id=>_trashed0.add(id));   // 演示模式：永久排除已策展掉的图（不依赖 localStorage，感觉词自动跟着不显）
  const KEPT = DATA.filter(e=>!_trashed0.has(e.id));
  const $ = s=>document.querySelector(s);
  const cv=$('#cv'), ctx=cv.getContext('2d');
  const DPR=Math.min(2, window.devicePixelRatio||1);
  let W=0,H=0;
  function fit(){
    W=innerWidth; H=innerHeight;
    cv.width=W*DPR; cv.height=H*DPR;
    cv.style.width=W+'px'; cv.style.height=H+'px';
  }
  fit(); addEventListener('resize', fit);

  /* ── 世界：感觉地图语义坐标系 ── */
  const WW=2200, WH=1300;
  const FEEL_POS = {
    轻盈:[30,8],  梦幻:[16,18], 柔和:[22,32], 自然:[36,22], 安静:[14,46], 沉浸:[44,38],
    玩味:[68,13], 未来:[58,28], 能量:[84,20], 冲击力:[80,45], 精致:[34,60], 典藏:[20,72],
    仪式感:[38,82], 神秘:[54,87], 警觉:[89,72], 科技:[73,64], 冷静:[58,57], 严谨:[70,82]
  };
  const wx=v=>v/100*WW, wy=v=>v/100*WH;

  function feelsOf(e){   // 感觉仍用于「召唤/搜索层」，只是不再当底图地理
    const m=new Map();
    e.facets.forEach(f=>f.feels.forEach(w=>m.set(w,(m.get(w)||0)+1)));
    return m;
  }
  /* ── 底图地理 = 色温(暖↔冷) × 明暗(亮↔暗)：眼睛能从缩略图直接验证的维度，秒懂不用学 ──
     感觉降级为召唤层（搜索框输入→命中图聚拢），不再决定位置。色值取每张 swatch 调色板均值。 */
  function hexRGB(h){ h=(h||'').replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join('');
    const n=parseInt(h,16); return (h.length===6 && !isNaN(n)) ? [(n>>16)&255,(n>>8)&255,n&255] : null; }
  function colorMetrics(e){
    const cs=(e.colors||[]).map(hexRGB).filter(Boolean);
    if(!cs.length) return {temp:0, bright:50};
    let r=0,g=0,b=0; cs.forEach(c=>{r+=c[0];g+=c[1];b+=c[2];}); const n=cs.length; r/=n;g/=n;b/=n;
    return {temp:r-b, bright:(0.299*r+0.587*g+0.114*b)/255*100};   // 暖(+)↔冷(−)；明度 0..100
  }
  const _metric=new Map(DATA.map(e=>[e.id, colorMetrics(e)]));
  let tMin,tMax,bMin,bMax;
  function pct(arr,q){ const s=[...arr].sort((a,b)=>a-b); const i=(s.length-1)*q, lo=Math.floor(i), hi=Math.ceil(i); return s[lo]+(s[hi]-s[lo])*(i-lo); }
  function recomputeNorm(entries){   // 按分位(非 min/max)定范围：离群值不独占极边、主体铺满；只按留下的图
    const ms=entries.map(e=>_metric.get(e.id)), ts=ms.map(m=>m.temp), bs=ms.map(m=>m.bright);
    const Q=0.06;
    tMin=pct(ts,Q); tMax=pct(ts,1-Q); bMin=pct(bs,Q); bMax=pct(bs,1-Q);
    if(tMax-tMin<1){ tMin=Math.min(...ts); tMax=Math.max(...ts); }
    if(bMax-bMin<1){ bMin=Math.min(...bs); bMax=Math.max(...bs); }
  }
  recomputeNorm(KEPT);
  const PAD=170, SPREAD=Math.min(0.72, 0.30+KEPT.length*0.03);   // 自适应：少图收紧成团、多图(≥14)沿用 0.72（A 收紧云团）
  function homePos(e){
    const m=_metric.get(e.id)||{temp:0,bright:50};
    let xN = tMax>tMin ? (m.temp-tMin)/(tMax-tMin) : .5;     // 0 最暖 → 1 最冷
    let yN = bMax>bMin ? (m.bright-bMin)/(bMax-bMin) : .5;   // 0 最暗 → 1 最亮
    xN=Math.max(0,Math.min(1,xN)); yN=Math.max(0,Math.min(1,yN));   // 离群值裁到边界内
    const fx=PAD+(1-xN)*(WW-2*PAD), fy=PAD+(1-yN)*(WH-2*PAD);
    return [ WW/2+(fx-WW/2)*SPREAD,    // 暖→左、冷→右
             WH/2+(fy-WH/2)*SPREAD ];  // 亮→上、暗→下
  }
  function placeItem(it){   // 按当前归一化重算色彩落点（删图后重排复用）
    let [hx,hy]=homePos(it.e);
    hx+=((it.seed*53)%17)-8; hy+=((it.seed*31)%17)-8;   // 抖动 ±30→±8：去噪、不那么散
    it.hx=Math.max(it.w/2+30, Math.min(WW-it.w/2-30, hx));
    it.hy=Math.max(it.h/2+30, Math.min(WH-it.h/2-30, hy));
  }

  /* ── 实体 ── */
  function makeItem(e, fake, fi){
    const seed=parseInt(e.id,10)+(fi||0)*97;
    const ar=e.ar||1;
    let w=Math.sqrt(20000*ar), h=w/ar;
    const s=Math.max(w/260,h/190,1); w/=s; h/=s;
    let [hx,hy]=homePos(e);
    if(fake){ hx+=((seed*53)%900)-450; hy+=((seed*31)%560)-280; }
    else    { hx+=((seed*53)%17)-8;  hy+=((seed*31)%17)-8; }   // 抖动 ±8
    hx=Math.max(w/2+30,Math.min(WW-w/2-30,hx));
    hy=Math.max(h/2+30,Math.min(WH-h/2-30,hy));
    return {e, fake:!!fake, seed, w, h, hx, hy, x:hx, y:hy, tx:hx, ty:hy,
            s:1, ts:1, dly:0, feels:feelsOf(e)};
  }
  const items = KEPT.map(e=>makeItem(e));   // 只为留下的图建实体，回收站的图不占位、不挤布局
  function relax(arr){   // 去重叠（只调 hx/hy，不动 x/tx，供初始化与删后重排复用）
    for(let p=0;p<160;p++){
      let moved=false;
      for(let a=0;a<arr.length;a++) for(let b=a+1;b<arr.length;b++){
        const A=arr[a],B=arr[b];
        const mX=(A.w+B.w)/2+20, mY=(A.h+B.h)/2+20;
        const dx=B.hx-A.hx, dy=B.hy-A.hy;
        if(Math.abs(dx)<mX && Math.abs(dy)<mY){
          moved=true;
          const ox=mX-Math.abs(dx), oy=mY-Math.abs(dy);
          if(ox<oy){ const s=(dx>=0?1:-1)*ox/2; A.hx-=s; B.hx+=s; }
          else     { const s=(dy>=0?1:-1)*oy/2; A.hy-=s; B.hy+=s; }
        }
      }
      if(!moved) break;
    }
  }
  relax(items);
  items.forEach(it=>{ it.x=it.tx=it.hx; it.y=it.ty=it.hy; });   // 初始：直接落位

  const imgs={};
  DATA.forEach(e=>{ const im=new Image(); im.src=''+e.thumb; imgs[e.id]=im; });

  const glows={};
  function glow(color){
    if(glows[color]) return glows[color];
    const g=document.createElement('canvas'); g.width=g.height=96;
    const c=g.getContext('2d');
    const gr=c.createRadialGradient(48,48,2,48,48,46);
    gr.addColorStop(0,color+'cc'); gr.addColorStop(.4,color+'55'); gr.addColorStop(1,color+'00');
    c.fillStyle=gr; c.fillRect(0,0,96,96);
    return glows[color]=g;
  }

  // 感觉词标签：落在「拥有该感觉的图」在色彩布局里的重心——可点召唤，
  // 且顺带显示这种感觉聚在色彩空间哪片（位置由色彩定、文字给感觉，两者并存）
  function buildWords(src){
    const wc={}; src.forEach(it=>it.feels.forEach((c,w)=>wc[w]=(wc[w]||0)+c));
    let ws=Object.keys(wc).map(w=>{
      let sx=0,sy=0,n=0;
      src.forEach(it=>{ if(it.feels.has(w)){ sx+=it.hx; sy+=it.hy; n++; } });
      return {w, x:sx/n, y:sy/n, n:wc[w]};
    });
    // 图少时词云会糊：只留手法数最多的 top-N，砍长尾、防标签重心叠印（"释撞"那种）
    ws.sort((a,b)=>b.n-a.n);
    const CAP = src.length<=10 ? 8 : 14;
    if(ws.length>CAP) ws=ws.slice(0,CAP);
    // 标签互斥：拉开重叠的感觉词（多数都平均到中心附近，不拉开会挤成一坨读不清）
    const MIN=200;
    for(let p=0;p<140;p++){ let moved=false;
      for(let a=0;a<ws.length;a++) for(let bb=a+1;bb<ws.length;bb++){
        const A=ws[a],B=ws[bb]; let dx=B.x-A.x, dy=B.y-A.y, d=Math.hypot(dx,dy)||1;
        if(d<MIN){ moved=true; const push=(MIN-d)/2; dx/=d; dy/=d; A.x-=dx*push; A.y-=dy*push; B.x+=dx*push; B.y+=dy*push; }
      }
      if(!moved) break;
    }
    return ws;
  }
  let words = buildWords(items);

  const cam={x:WW/2, y:WH/2, z:.45};
  const ct ={x:WW/2, y:WH/2, z:.45};
  const smooth=(v,a,b)=>Math.max(0,Math.min(1,(v-a)/(b-a)));

  let focus=null, activeFacet=null, summon=null, stressOn=false, fakes=null;
  let hover=null, dragging=null, lastT=performance.now(), fpsE=60, wordHit=[];

  function doSummon(q){
    q=q.trim();
    if(!q){ clearSummon(); return; }
    const toks=q.toLowerCase().split(/[\s,，、]+/).filter(Boolean);
    const all=visibleItems();
    const scored=[];
    all.forEach(it=>{
      let sc=0;
      it.feels.forEach((c,w)=>toks.forEach(t=>{
        if(w.includes(t)||t.includes(w)) sc+=3*c;
        else if([...t].some(ch=>w.includes(ch))) sc+=c;
      }));
      it.e.facets.forEach(f=>toks.forEach(t=>{
        if(f.zh.includes(t)) sc+=2;
        if((f.en+' '+(f.q||'')).toLowerCase().includes(t)) sc+=2;
      }));
      if(sc>0) scored.push([sc,it]);
    });
    scored.sort((a,b)=>b[0]-a[0]);
    const lit=new Set(scored.map(s=>s[1]));
    const cx=ct.x, cy=ct.y;
    const maxSc = scored.length? scored[0][0] : 1;
    let ring=0, slot=0, cap=1, R=0;
    scored.forEach(([sc,it],i)=>{
      if(slot>=cap){ ring++; slot=0; cap=ring*7; }
      R=ring===0?0: ring*300;
      const a=ring===0?0: (slot/cap)*Math.PI*2 + ring*.6;
      it.tx=cx+Math.cos(a)*R*1.25; it.ty=cy+Math.sin(a)*R*.85;
      it.dly=performance.now()+i*40;
      it.ts = 0.82 + 0.55*(sc/maxSc);
      slot++;
    });
    all.forEach(it=>{ if(!lit.has(it)){ it.tx=it.hx; it.ty=it.hy; it.ts=1; it.dly=performance.now()+Math.random()*200; }});
    summon={q,lit,n:scored.length};
    $('#summon').classList.add('live');
    $('#qn').textContent=scored.length+' 张对味';
    $('#hint').classList.add('off');
  }
  function clearSummon(){
    if(!summon) return;
    summon=null;
    const all=visibleItems();
    all.forEach((it,i)=>{ it.tx=it.hx; it.ty=it.hy; it.ts=1; it.dly=performance.now()+i*4; });
    $('#summon').classList.remove('live');
    $('#q').value='';
  }
  $('#q').addEventListener('keydown',e=>{ if(e.key==='Enter') doSummon($('#q').value); });
  $('#qx').onclick=()=>clearSummon();
  window.__summon = doSummon;   // 供抽屉「同款」跨器官联动：抽屉里点手法卡 → 画布召唤该感觉词

  function toggleStress(on){   // 压测机制保留（供 #v=4 开发自测），UI 按钮已移除
    stressOn = on===undefined? !stressOn : on;
    if(stressOn && !fakes){
      fakes=[];
      for(let k=1;k<=25;k++) DATA.forEach((e,j)=>fakes.push(makeItem(e,true,k*19+j)));
    }
  }

  function enterFocus(it){
    focus=it; activeFacet=null;
    const z=Math.min(3.6, (H*.62)/it.h);
    ct.z=z; ct.x=it.x + it.w*.30 + 150/z; ct.y=it.y;
    $('#hint').classList.add('off');
  }
  function exitFocus(){
    focus=null; activeFacet=null;
    $('#fbar').classList.remove('on');
    if(ct.z>1.2) ct.z=.55;
  }
  addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      if(document.activeElement===$('#q')){ $('#q').blur(); return; }
      if(focus) exitFocus();
      else if(summon) clearSummon();
    }
  });

  cv.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=Math.exp(-e.deltaY*.0016);
    const nz=Math.max(.18, Math.min(4.2, ct.z*f));
    const px=(e.clientX-W/2)/ct.z+ct.x, py=(e.clientY-H/2)/ct.z+ct.y;
    ct.x=px-(e.clientX-W/2)/nz; ct.y=py-(e.clientY-H/2)/nz; ct.z=nz;
    if(focus && nz<1.3) exitFocus();
    $('#hint').classList.add('off');
  },{passive:false});
  cv.addEventListener('pointerdown',e=>{ dragging={x:e.clientX,y:e.clientY,moved:0}; cv.classList.add('dragging'); });
  addEventListener('pointermove',e=>{
    if(dragging){
      const dx=e.clientX-dragging.x, dy=e.clientY-dragging.y;
      dragging.moved+=Math.abs(dx)+Math.abs(dy);
      ct.x-=dx/cam.z; ct.y-=dy/cam.z; cam.x-=dx/cam.z; cam.y-=dy/cam.z;
      dragging.x=e.clientX; dragging.y=e.clientY;
    }
    mouse.x=e.clientX; mouse.y=e.clientY;
  });
  addEventListener('pointerup',e=>{
    if(dragging && dragging.moved<6){       // 单击（非拖拽）
      const it=pick(e.clientX,e.clientY);
      if(it){                                // 先判图：命中图 → 开抽屉（拆解）
        const idx=DATA.indexOf(it.e);
        if(idx>=0 && window.openDrawer) window.openDrawer(idx);
      }else{                                 // 没命中图
        let hitWord=false;
        for(const wh of wordHit){             // 命中感觉词 → 召唤该感觉聚类
          if(Math.hypot(e.clientX-wh.x, e.clientY-wh.y)<wh.r){ $('#q').value=wh.w; doSummon(wh.w); hitWord=true; break; }
        }
        if(!hitWord && summon) clearSummon();  // 点空白 → 取消聚类（图飞回色温×明暗原位）
      }
    }
    dragging=null; cv.classList.remove('dragging');
  });
  const mouse={x:-1,y:-1};

  function pick(mx,my){
    const all=visibleItems();
    for(let i=all.length-1;i>=0;i--){
      const it=all[i];
      const sx=(it.x-cam.x)*cam.z+W/2, sy=(it.y-cam.y)*cam.z+H/2;
      const hw=Math.max(12,it.w*cam.z/2), hh=Math.max(12,it.h*cam.z/2);
      if(Math.abs(mx-sx)<hw && Math.abs(my-sy)<hh) return it;
    }
    return null;
  }
  const trashedSet = new Set();   // 软删除：标记跳过绘制/命中/召唤
  window.__canvasSetTrashed = ids => { trashedSet.clear(); (ids||[]).forEach(id=>trashedSet.add(id)); };
  function visibleItems(){
    const base = stressOn? items.concat(fakes||[]) : items;
    return trashedSet.size ? base.filter(it=>!trashedSet.has(it.e.id)) : base;
  }
  // 删图后即时重排：只按留下的图重算色彩归一化+落点+感觉词重心，平滑挪过去（不用刷新）
  window.__canvasRelayout = ()=>{
    const live = items.filter(it=>!trashedSet.has(it.e.id));
    if(live.length<2) return;
    recomputeNorm(live.map(it=>it.e));
    live.forEach(placeItem);
    relax(live);
    const now=performance.now();
    live.forEach((it,i)=>{ it.tx=it.hx; it.ty=it.hy; it.dly=now+i*6; });
    words = buildWords(live);
    if(!summon){ window.__canvasResume && window.__canvasResume(); }
  };

  /* ── 主循环（加 pause/resume 钩子）── */
  let rafId=null, running=false;
  function tick(now){
    const dt=now-lastT; lastT=now;
    fpsE=fpsE*.95+(1000/Math.max(1,dt))*.05;

    cam.x+=(ct.x-cam.x)*.085; cam.y+=(ct.y-cam.y)*.085; cam.z+=(ct.z-cam.z)*.085;
    const all=visibleItems();
    for(const it of all){
      if(now<it.dly) continue;
      it.x+=(it.tx-it.x)*.045; it.y+=(it.ty-it.y)*.045;
      it.s+=(it.ts-it.s)*.045;
    }
    draw(now);
    if(running) rafId=requestAnimationFrame(tick);
  }
  window.__canvasPause=()=>{ running=false; if(rafId) cancelAnimationFrame(rafId); rafId=null; };
  window.__canvasResume=()=>{ if(running) return; running=true; fit(); lastT=performance.now(); rafId=requestAnimationFrame(tick); };

  function drawCard(it, now, z, mode){
    const floatY = (mode==='normal' && !focus && !summon) ? Math.sin(now*.0008+it.seed)*3 : 0;
    const sc = focus ? 1 : it.s;
    const sx=(it.x-cam.x)*z+W/2, sy=(it.y-cam.y)*z+H/2 + floatY;
    const sw=it.w*z*sc, sh=it.h*z*sc;
    if(sx+sw/2<-90||sx-sw/2>W+90||sy+sh/2<-90||sy-sh/2>H+90) return;
    const base = mode==='dim'?.13 : mode==='focusdim'?.08 : 1;
    const im=imgs[it.e.id];
    const isHov = (it===hover && mode!=='focusdim');
    const hovS=isHov?1.06:1;
    const w2=sw*hovS, h2=sh*hovS;
    const fr=Math.max(1.5, 2.2*z);
    ctx.globalAlpha=base;
    ctx.save();
    ctx.shadowColor='rgba(26,26,26,'+(mode==='lit'?.24:.15)+')';
    ctx.shadowBlur=Math.min(24,(mode==='lit'?15:10)*z); ctx.shadowOffsetY=mode==='lit'?6:3;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.roundRect(sx-w2/2-fr, sy-h2/2-fr, w2+fr*2, h2+fr*2, Math.min(10,4*z+2));
    ctx.fill();
    ctx.restore();
    ctx.globalAlpha=base;
    if(im && im.complete && im.naturalWidth){
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(sx-w2/2, sy-h2/2, w2, h2, Math.min(7,3*z+1.5));
      ctx.clip();
      ctx.drawImage(im, sx-w2/2, sy-h2/2, w2, h2);
      ctx.restore();
    }else{
      ctx.fillStyle='#e3dfd6'; ctx.fillRect(sx-w2/2, sy-h2/2, w2, h2);
    }
    if(mode==='lit'){
      ctx.globalAlpha=1;
      ctx.strokeStyle='#b0402f'; ctx.lineWidth=Math.max(1.5,2.2*z);
      ctx.beginPath();
      ctx.roundRect(sx-w2/2-fr, sy-h2/2-fr, w2+fr*2, h2+fr*2, Math.min(10,4*z+2));
      ctx.stroke();
    }
    if(isHov && base>.5 && sw>70){
      ctx.globalAlpha=1; ctx.textAlign='center';
      ctx.font='12px "PingFang SC"'; ctx.fillStyle='#1a1a1a';
      ctx.fillText(it.e.title, sx, sy+h2/2+20);
      ctx.font='10px "PingFang SC"'; ctx.fillStyle='#8a8478';
      ctx.fillText([...it.feels.keys()].join(' · '), sx, sy+h2/2+36);
    }
  }

  function draw(now){
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.fillStyle='#f7f5f0'; ctx.fillRect(0,0,W,H);
    const z=cam.z;
    const all=visibleItems();
    hover = (!dragging && z>.3)? pick(mouse.x,mouse.y) : null;

    // 感觉词标签（位置=该感觉成员的色彩重心）：概览满显+奶油晕(压图上也读得清/可点)，放大看图时退场
    const wA=1-smooth(z,.55,.85);
    wordHit=[];
    if(wA>0){
      ctx.textAlign='center';
      words.forEach(o=>{
        const sx=(o.x-cam.x)*z+W/2, sy=(o.y-cam.y)*z+H/2;
        if(sx<-200||sx>W+200||sy<-80||sy>H+80) return;
        const on = summon && summon.q===o.w;
        ctx.save();
        ctx.shadowColor='rgba(247,245,240,.92)'; ctx.shadowBlur=8;   // 奶油晕保留，压图上仍读得清
        ctx.globalAlpha=wA*(on?.95:.5);
        ctx.fillStyle=on?'#b0402f':'#a59c8b';
        ctx.font=(on?'600 ':'400 ')+'18px Georgia, "Songti SC", serif';
        ctx.fillText(o.w, sx, sy-9);
        ctx.globalAlpha=wA*(on?.7:.38); ctx.fillStyle=on?'#b0402f':'#bdb6a8'; ctx.font='10px "PingFang SC"';
        ctx.fillText(o.n+' 手法', sx, sy+6);
        ctx.restore();
        wordHit.push({w:o.w, x:sx, y:sy-4, r:54});
      });
    }

    if(focus){
      for(const it of all){ if(it!==focus) drawCard(it, now, z, 'focusdim'); }
      drawCard(focus, now, z, 'normal');
    }else if(summon){
      for(const it of all){ if(!summon.lit.has(it)) drawCard(it, now, z, 'dim'); }
      for(const it of all){ if(summon.lit.has(it)) drawCard(it, now, z, 'lit'); }
    }else{
      for(const it of all) drawCard(it, now, z, 'normal');
    }

    if(focus && z>1.2){
      const it=focus;
      const aA=smooth(z,1.2,Math.min(3,ct.z));
      const sx=(it.x-cam.x)*z+W/2, sy=(it.y-cam.y)*z+H/2;
      const sw=it.w*z, sh=it.h*z;
      const fs=it.e.facets;
      const lx=sx+sw/2+56;
      const slots=fs.map((f,i)=> sy-sh/2 + (i+.5)*(sh/fs.length));
      activeFacet=null;
      fs.forEach((f,i)=>{
        const ax=sx-sw/2+(f.at?f.at[0]:50)/100*sw;
        const ay=sy-sh/2+(f.at?f.at[1]:50)/100*sh;
        const ly=slots[i];
        const near = Math.hypot(mouse.x-ax,mouse.y-ay)<26 ||
                     (mouse.x>lx-12 && mouse.x<lx+240 && Math.abs(mouse.y-ly)<16);
        if(near) activeFacet=f;
        ctx.globalAlpha=aA*(near?1:.85);
        const r=5+Math.sin(now*.003+i)*1.2;
        ctx.strokeStyle='#b0402f'; ctx.lineWidth=1.6;
        ctx.beginPath(); ctx.arc(ax,ay,r,0,7); ctx.stroke();
        ctx.fillStyle='#b0402f';
        ctx.beginPath(); ctx.arc(ax,ay,1.8,0,7); ctx.fill();
        ctx.strokeStyle=near?'#b0402f':'#bdb5a6'; ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(ax+r+2,ay);
        ctx.bezierCurveTo(ax+(lx-ax)*.55, ay, lx-40, ly, lx-10, ly);
        ctx.stroke();
        ctx.textAlign='left';
        ctx.fillStyle=near?'#1a1a1a':'#3a352e';
        ctx.font='600 14px "PingFang SC"';
        ctx.fillText(f.zh, lx, ly-3);
        ctx.fillStyle='#8a8478'; ctx.font='10.5px "PingFang SC"';
        ctx.fillText(f.en, lx, ly+13);
      });
      const fb=$('#fbar');
      if(activeFacet){
        fb.innerHTML=`<div class="say">${activeFacet.say}</div><div class="tune"><b>边界</b> ${activeFacet.tune}</div>`;
        fb.classList.add('on');
      }else fb.classList.remove('on');
    }
  }

  const m=location.hash.match(/v=(\d)/);
  if(m){
    const v=+m[1];
    if(v===1){ cam.z=ct.z=.55; }
    if(v===2){ cam.z=ct.z=.55; enterFocus(items[Math.min(14,items.length-1)]); cam.x=ct.x; cam.y=ct.y; cam.z=ct.z; }
    if(v===3){ cam.z=ct.z=.55; doSummon('安静'); }
    if(v===4){ cam.z=ct.z=.50; toggleStress(true); }
  }
  // 默认模式=画布 → 直接启动；切走时由 __canvasPause 暂停
  window.__canvasResume();
})();
</script>

<!-- ── 找灵感（demo-e 瀑布流，沿用）── -->
<script>
(()=>{
  const host = url => url.replace(/^https?:\/\//,'').replace(/\/.*$/,'');
  const shot = url => `https://s.wordpress.com/mshots/v1/${encodeURIComponent(url)}?w=900&h=600`;
  const pad2 = n => String(n).padStart(2,'0');
  const imgTag = s => {
    const poster = s.img || shot(s.url);
    if(s.vid) return `<video class="mv" autoplay muted loop playsinline preload="auto" poster="${poster}">
      <source src="${s.vid}" type="video/mp4"></video>`;
    return `<img loading="lazy" src="${poster}" alt="${s.name}"
      onerror="this.onerror=null;this.src='${shot(s.url)}'">`;
  };

  const SITES = [
    {name:'CSS Design Awards', url:'https://www.cssdesignawards.com/', zone:'综合', cat:'综合', score:8.5, img:'shots/cssda.jpg', desc:'老牌网页设计奖，每日甄选全球最佳网站，评审维度细到交互与创新。'},
    {name:'Awwwards',          url:'https://www.awwwards.com/',        zone:'综合', cat:'综合', score:9.2, img:'shots/awwwards.jpg', desc:'最权威的网页设计奖，前沿视觉的风向标。每天甄选一个 Site of the Day。'},
    {name:'Variant',           url:'https://variant.com/',             zone:'综合', cat:'生成式', score:7.8, img:'shots/variant.jpg', desc:'“想法不用解释，直接滚着看”——把感觉翻成一屏屏现成设计的生成式画廊。'},
    {name:'Godly',             url:'https://godly.website/',           zone:'综合', cat:'综合', score:9.5, img:'shots/godly.jpg', vid:'shots/godly.mp4', desc:'极度挑剔的网站灵感聚合，质量门槛很高，几乎张张能直接当审美标杆。'},
    {name:'Curations Supply',  url:'https://curations.supply/',        zone:'综合', cat:'综合', score:8.0, img:'shots/curations.jpg', desc:'设计资源的精选目录，把各路灵感站分门别类，找特定类型时好用。'},
    {name:'Sutera',      url:'https://www.sutera.ch/',   zone:'单站', cat:'作品集', score:9.0, img:'folio/sutera.jpg',  vid:'folio/sutera.mp4',  desc:'个人作品集，editorial 排版配漂浮 3D 物件'},
    {name:'Bruno Simon', url:'https://bruno-simon.com/', zone:'单站', cat:'作品集', score:9.5, img:'folio/bruno.jpg',   desc:'Three.js 大神的 3D 交互作品集'},
    {name:'Michele Du',  url:'https://micheledu.com/',   zone:'单站', cat:'作品集', score:9.0, img:'folio/michele.jpg', vid:'folio/michele.mp4', desc:'交互设计师作品集，叙事范本'},
    {name:'Just McKissick', url:'https://justmckissick.com/', zone:'单站', cat:'作品集', score:9.0, img:'folio/justmckissick.jpg', desc:'产品设计师个人站，Meta / Moody\'s 案例叙事，履历即作品的范本'},
    {name:'Floema',      url:'https://www.floema.com/',  zone:'单站', cat:'品牌站', score:9.0, img:'folio/floema.jpg', vid:'folio/floema2.mp4', desc:'城市家具品牌站，奶油底 editorial 排版，连体胶囊导航是切换器范本'},
    {name:'SuperrBook',  url:'https://www.superr.ai/',   zone:'单站', cat:'品牌站', score:8.5, img:'folio/superr2.jpg', desc:'学生 AI 手写本品牌落地页，童趣插画 + 利落叙事把硬件讲软'},
    {name:'Refero',            url:'https://refero.design/',     zone:'专项', cat:'真实 UI',  score:8.5, img:'shots/refero.jpg', desc:'真实产品的界面截图库，可按页面与流程检索，看成熟产品的真实设计决策。'},
    {name:'Mobbin',            url:'https://mobbin.com/',        zone:'专项', cat:'真实 UI',  score:8.5, img:'shots/mobbin.jpg', desc:'海量真实 App 截图，按 App、流程、控件检索，移动端设计的活字典。'},
    {name:'Lapa Ninja',        url:'https://www.lapa.ninja/',    zone:'专项', cat:'落地页',   score:8.0, img:'shots/lapa.jpg', desc:'落地页专门画廊，按行业与板块分类，结构清晰，落地页与个人站灵感首选。'},
    {name:'Component Gallery', url:'https://component.gallery/', zone:'专项', cat:'设计系统', score:8.0, img:'shots/component.jpg', desc:'跨产品的组件设计参考，同一个组件看各家怎么做，搭设计系统必看。'},
  ];

  const ZONES = ['综合','单站','专项'];

  let html='', rowIdx=0;
  ZONES.forEach(z=>{
    const list = SITES.filter(s=>s.zone===z);
    if(!list.length) return;
    // 区头：单站直接跟「作品集 N · 品牌站 N」说明
    let headExtra='';
    if(z==='单站'){
      const cc={}; list.forEach(s=>cc[s.cat]=(cc[s.cat]||0)+1);
      headExtra = `<span class="grp-inline">`+['作品集','品牌站'].filter(c=>cc[c]).map(c=>`${c} <b>${cc[c]}</b>`).join(' · ')+`</span>`;
    }
    html += `<section class="zone"><div class="zone-head"><h3>${z}</h3><span class="cnt">${list.length} 站</span>${headExtra}<span class="ln"></span></div>`;
    if(z==='单站'){
      // 按 cat 分组：品牌站（落地页=招贴）钉墙在上，作品集（书）上架在下
      const PINNED = new Set(['品牌站']);
      const cats=[], byCat={};
      list.forEach(s=>{ if(!byCat[s.cat]){byCat[s.cat]=[]; cats.push(s.cat);} byCat[s.cat].push(s); });
      const veil = s => `<div class="veil"><span class="vk">${s.cat}</span><span class="vn">${s.name}</span><span class="vd">${s.desc}</span><span class="vh">${host(s.url)}</span><span class="vgo">访问 ↗</span></div>`;
      const frame = s => `<div class="frame">${imgTag(s)}${veil(s)}</div>`;

      // —— 钉墙（每框一条倒 V 挂绳 + 朱砂图钉），cards 缩小、轻微自然下垂 ——
      const wallHTML = cats.filter(c=>PINNED.has(c)).map(c=>{
        const pins = byCat[c].map((s,i)=>`
          <a class="art pin pin--${i%2?'r':'l'}" href="${s.url}" target="_blank" rel="noopener">
            <svg class="cord" viewBox="0 0 100 30" preserveAspectRatio="none"><polyline points="0,30 50,2 100,30"/></svg>
            <span class="tack"></span>
            <div class="print">${frame(s)}</div>
          </a>`).join('');
        return `<div class="wall"><div class="pin-row">${pins}</div></div>`;
      }).join('');

      // —— 上架（左起第一本最大、其余等比缩小、直立齐脚），小图加 art--sm 让边框更细 ——
      const GAP = 1.6;
      const shelfHTML = cats.filter(c=>!PINNED.has(c)).map(c=>{
        const r = byCat[c], n = r.length;
        const center = n<=2;
        // 宽度 = 内缩后内容框（占全宽 91%）的百分比；左对齐时填满 100，首尾正好压住木板顶面两端
        const bigW   = center ? 38 : 34;
        const smallW = n<=1 ? bigW : center ? 28 : (100 - bigW - GAP*(n-1)) / (n-1);
        const cells = r.map((s,i)=>`
          <a class="art ${i===0?'':'art--sm'}" style="width:${(i===0?bigW:smallW).toFixed(1)}%" href="${s.url}" target="_blank" rel="noopener">
            <div class="print">${frame(s)}</div>
          </a>`).join('');
        return `<div class="shelf-row" style="justify-content:${center?'center':'flex-start'};gap:${GAP}%">`
          + cells
          + `</div><div class="ledge"><span class="ltop"></span><span class="lface"></span></div>`;
      }).join('');

      html += wallHTML + (shelfHTML ? `<div class="shelf">${shelfHTML}</div>` : '');
    }else if(z==='综合'){
      html += list.map(s=>{ rowIdx++; return `
        <div class="row">
          <a class="shot" href="${s.url}" target="_blank" rel="noopener"><div class="frame">
            ${imgTag(s)}
            <div class="veil"><span class="vk">${s.cat}</span><span class="vn">${s.name}</span><span class="vgo">访问 ↗</span></div>
          </div></a>
          <div class="info cell">
            <div class="tagline"><span class="no">№ ${pad2(rowIdx)}</span><span>${s.cat}</span></div>
            <h2>${s.name}</h2>
            <div class="host">${host(s.url)}</div>
            <div class="desc">${s.desc}</div>
            <a class="visit" href="${s.url}" target="_blank" rel="noopener">访问 ↗</a>
          </div>
        </div>`; }).join('');
    }else{
      html += `<div class="mini">` + list.map(s=>`
        <a class="mcard" href="${s.url}" target="_blank" rel="noopener">
          <div class="shot"><div class="frame">
            ${imgTag(s)}
            <div class="veil"><span class="vk">${s.cat}</span><span class="vd">${s.desc}</span><span class="vgo">访问 ↗</span></div>
          </div></div>
          <div class="mtag">${s.cat}</div>
          <div class="mname">${s.name}</div>
          <div class="mhost">${host(s.url)}</div>
        </a>`).join('') + `</div>`;
    }
    html += `</section>`;
  });
  document.getElementById('main').innerHTML = html;
})();
</script>

<!-- ── 940 抽屉器官（移植自 index.html；段①只读查看 + 本地收存）── -->
<script>
(function(){
  const DATA = window.LIBRARY;
  const $ = s => document.querySelector(s);

  const saved = (()=>{ try{return JSON.parse(localStorage.getItem('lingganku.v3'))||{}}catch(e){return {}} })();
  const state = {
    cur: Math.min(saved.cur||0, DATA.length-1),
    picked: new Set(saved.picked||[]),
    trashed: new Set(saved.trashed||[]),     // 软删除：仅页面隐藏，原件不动，可找回
    viewed: Array.isArray(saved.viewed) ? saved.viewed.slice() : []
  };
  function persist(){
    localStorage.setItem('lingganku.v3', JSON.stringify({
      cur:state.cur, picked:[...state.picked], trashed:[...state.trashed], viewed:state.viewed
    }));
  }

  const allFacets = [];
  DATA.forEach(e=>e.facets.forEach(f=>allFacets.push({entry:e,facet:f})));
  function findFacet(fid){ return allFacets.find(x=>x.facet.id===fid)||null; }

  const ICO = {
    plus:  '<svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M8 3.2v9.6M3.2 8h9.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none"/></svg>',
    check: '<svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M3.2 8.6l3.1 3 6.5-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>',
    search:'<svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><circle cx="7" cy="7" r="3.8" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M9.9 9.9l3.3 3.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
    trash: '<svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><path d="M3 4.2h10M6.4 4.2V3c0-.4.3-.7.7-.7h1.8c.4 0 .7.3.7.7v1.2M4.4 4.2l.5 8c0 .5.4.8.8.8h4.6c.4 0 .8-.3.8-.8l.5-8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>'
  };

  let toastTimer;
  function flash(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('on'),2200); }
  function fallbackCopy(txt){ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy')}catch(e){} ta.remove(); }
  function copyText(txt,msg){ const done=()=>flash(msg||'已复制'); if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done).catch(()=>{fallbackCopy(txt);done();}); } else { fallbackCopy(txt); done(); } }

  function setHot(fid,on){ document.querySelectorAll(`[data-fid="${fid}"]`).forEach(el=>el.classList.toggle('hot',on)); }

  /* ════ 演示模式（Vercel / ?demo=1）：纯浏览可玩，写盘/喂图转下载 CTA ════ */
  const CABINET_DEMO = !!window.CABINET_DEMO;
  const REPO_URL = window.REPO_URL || 'https://github.com/pxx-design/cabinet';
  const DEMO_LANG = (navigator.language||'en').toLowerCase().startsWith('zh') ? 'zh' : 'en';
  const DEMO_T = {
    zh:{ cta:'在线体验版，创建自己的<b>灵感库 →</b>',
         head:'你收的手法',
         pitch:'下载「灵感库」，一键让你的 AI 把这些手法用起来',
         get:'去获取',
         nudge:'收好了 ✓ 想用起来？点右上角「已收」',
         note:'图片仅为示例，如涉及版权请联系删除' },
    en:{ cta:'Live demo — create your own <b>library →</b>',
         head:'Your saved techniques',
         pitch:'Get Cabinet — let your AI put these techniques to work, in one click',
         get:'Get it',
         nudge:'Saved ✓ Want to use it? Open "Saved" (top-right)',
         note:'Images shown as examples — contact us to remove.' }
  }[DEMO_LANG];
  function initDemo(){
    const cta=$('#demo-cta'); if(cta){ cta.innerHTML=DEMO_T.cta; cta.href=REPO_URL; }
    const note=$('#demo-note'); if(note) note.textContent=DEMO_T.note;
    const head=document.querySelector('.pp-head span'); if(head) head.textContent=DEMO_T.head;
    const foot=document.querySelector('.pp-foot');
    if(foot) foot.innerHTML=`<div class="pp-pitch">${DEMO_T.pitch}</div><a class="pp-get" href="${REPO_URL}" target="_blank" rel="noopener">${DEMO_T.get}</a>`;
  }
  function demoNudge(){
    if(localStorage.getItem('lingganku.demoNudged')) return;
    localStorage.setItem('lingganku.demoNudged','1');
    flash(DEMO_T.nudge);
  }

  // 段①：收存本地（localStorage）；写 _desk.json 给「转译」用 = 段②（磁盘桥）
  function togglePick(fid){
    const adding = !state.picked.has(fid);
    adding ? state.picked.add(fid) : state.picked.delete(fid);
    persist(); scheduleDesk(); renderPicked();
    if($('#drawer').classList.contains('on')) renderDrawer();
    if(CABINET_DEMO && adding && state.picked.size>=2) demoNudge();
  }

  /* ── 锚点校准：拖圆点改 at，松手按 facet id 精确写回 data-v3.js（移植自 index.html）── */
  let calibrating = false;
  function toggleCalibrate(){
    calibrating = !calibrating;
    renderPlate();
    flash(calibrating ? '校准开 · 拖圆点到准确位置，松手自动写回' : '校准关');
  }
  function startAnchorDrag(ev, facet, el, inner){
    ev.preventDefault(); ev.stopPropagation();
    try{ el.setPointerCapture(ev.pointerId); }catch(e){}
    const rect = inner.getBoundingClientRect();
    const move = e=>{
      const nx = Math.max(0, Math.min(100, (e.clientX-rect.left)/rect.width*100));
      const ny = Math.max(0, Math.min(100, (e.clientY-rect.top)/rect.height*100));
      facet.at = [Math.round(nx*10)/10, Math.round(ny*10)/10];
      el.style.left = facet.at[0]+'%'; el.style.top = facet.at[1]+'%';
      el.classList.toggle('flip', facet.at[0]>72);
    };
    const up = ()=>{
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      writeAnchor(facet);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  }
  async function writeAnchor(facet){
    if(!dirHandle || !(await refreshConn())){ flash('已暂存（刷新会丢）— 连接文件夹后才能写回磁盘'); return; }
    try{
      const fh = await dirHandle.getFileHandle('data-v3.js');
      const txt = await (await fh.getFile()).text();
      const idEsc = facet.id.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const re = new RegExp('(id:\\s*"'+idEsc+'"[\\s\\S]*?at:\\s*)\\[[^\\]]*\\]');
      const next = txt.replace(re, '$1['+facet.at[0]+', '+facet.at[1]+']');
      if(next===txt){ flash('未匹配到 '+facet.id+'，未写回'); return; }
      const w = await fh.createWritable(); await w.write(next); await w.close();
      flash('已写回 '+facet.id+' → ['+facet.at[0]+', '+facet.at[1]+']');
    }catch(err){ flash('写回失败: '+err.message); }
  }

  function renderPlate(){
    const e = DATA[state.cur];
    $('#drawer').classList.toggle('wide', (e.ar||1) > 1.4);
    const plate = $('#plate');
    plate.classList.toggle('calibrating', calibrating);
    plate.innerHTML = `<span class="plate-inner" style="--ar:${e.ar||1.6}"><img src="${e.asset}" alt="${e.title}"></span>`;
    const inner = plate.querySelector('.plate-inner');
    e.facets.forEach((f,i)=>{
      const a = document.createElement('span');
      a.className = 'anchor' + (state.picked.has(f.id)?' picked':'') + (f.at[0]>72?' flip':'') + (calibrating?' cal':'');
      a.dataset.fid = f.id;
      a.style.left = f.at[0]+'%'; a.style.top = f.at[1]+'%';
      a.innerHTML = `<span class="dot" style="animation-delay:${(i*0.45).toFixed(2)}s">${i+1}</span><span class="tag">${f.zh}</span>`;
      a.onmouseenter = ()=>setHot(f.id,true);
      a.onmouseleave = ()=>setHot(f.id,false);
      if(calibrating) a.onpointerdown = ev=>startAnchorDrag(ev, f, a, inner);
      else            a.onclick = ()=>togglePick(f.id);
      inner.appendChild(a);
    });
    $('#plate-caption').innerHTML =
      `<span class="no">№${e.id}</span>`+
      `<span>${e.facets.length} 手法</span>`+
      `<span class="cap-gap"></span>`+
      `<span class="nav-arrows"><button id="prev" title="上一张 ←">←</button><button id="next" title="下一张 →">→</button></span>`+
      `<span>${state.cur+1} / ${DATA.length}</span>`+
      `<button class="plate-cal${calibrating?' on':''}" id="plate-cal" title="校准锚点 — 拖圆点到准确位置，松手写回 data-v3.js">✛ 校准</button>`+
      `<button class="plate-trash" id="plate-trash" title="删除这张 — 可在回收站找回">${ICO.trash} 删除</button>`;
    $('#prev').onclick = ()=>nav(-1);
    $('#next').onclick = ()=>nav(1);
    $('#plate-cal').onclick = toggleCalibrate;
    $('#plate-trash').onclick = ()=>trashEntry(DATA[state.cur].id);
    const sw = $('#swatches');
    sw.innerHTML = (e.colors||[]).map(c=>
      `<button class="sw" style="background:${c}" title="点击复制 ${c}" data-hex="${c}"></button>`).join('');
    sw.querySelectorAll('.sw').forEach(b=>{ b.onclick = ()=>copyText(b.dataset.hex, '已复制 '+b.dataset.hex); });
  }
  function nav(d){ state.cur=(state.cur+d+DATA.length)%DATA.length; persist(); renderDrawer(); }

  function renderPanel(){
    const e = DATA[state.cur];
    const panel = $('#panel');
    const fm = new Map();
    e.facets.forEach(f=>f.feels.forEach(w=>fm.set(w,(fm.get(w)||0)+1)));
    const feels = [...fm.entries()].sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
    let h = `<div class="panel-meta">№${e.id} · ${e.family}</div><h2>${e.title}</h2>`;
    h += `<div class="feel-line"><span class="lab">感觉</span>`;
    h += feels.map(w=>`<button class="feel" data-feel="${w}">${w}</button>`).join('');
    h += `<span class="feel-hint">点感觉词 = 整组收；点手法卡 = 在画布看同款</span></div>`;
    e.facets.forEach((f,i)=>{
      const picked = state.picked.has(f.id);
      h += `<div class="move${picked?' picked':''}" data-fid="${f.id}" title="在画布上看同款">
        <span class="num">${i+1}</span>
        <span class="zh">${f.zh}</span>
        <span class="acts">
          <button class="act pick${picked?' on':''}" data-pick="${f.id}" title="${picked?'已收 · 点击移出':'收 — 给「转译」用'}">${picked?ICO.check:ICO.plus}</button>
          <a class="act" href="https://www.google.com/search?tbm=isch&q=${encodeURIComponent(f.q)}" target="_blank" rel="noopener" title="搜同类视觉" onclick="event.stopPropagation()">${ICO.search}</a>
        </span>
        <span class="en">${f.en}</span>
        <span class="mech">${f.mech}</span>
      </div>`;
    });
    panel.innerHTML = h; panel.scrollTop = 0;
    panel.querySelectorAll('.move').forEach(m=>{
      m.onclick = ()=>summonSame(m.dataset.fid);
      m.onmouseenter = ()=>setHot(m.dataset.fid,true);
      m.onmouseleave = ()=>setHot(m.dataset.fid,false);
    });
    panel.querySelectorAll('.act.pick').forEach(b=>{
      b.onclick = ev=>{ ev.stopPropagation(); togglePick(b.dataset.pick); };
    });
    panel.querySelectorAll('.feel').forEach(b=>{
      const word = b.dataset.feel;
      const ids = e.facets.filter(f=>f.feels.includes(word)).map(f=>f.id);
      b.onclick = ()=>{
        const allIn = ids.every(id=>state.picked.has(id));
        ids.forEach(id=> allIn ? state.picked.delete(id) : state.picked.add(id));
        persist(); scheduleDesk(); renderPicked(); renderDrawer();
      };
      b.onmouseenter = ()=>ids.forEach(id=>setHot(id,true));
      b.onmouseleave = ()=>ids.forEach(id=>setHot(id,false));
    });
  }

  function renderDrawer(){ renderPlate(); renderPanel(); }
  function markViewed(id){ const i=state.viewed.indexOf(id); if(i>=0) state.viewed.splice(i,1); state.viewed.push(id); }
  function syncScrim(){ $('#scrim').classList.toggle('on', $('#drawer').classList.contains('on')); }
  function openDrawer(i){
    state.cur=i; markViewed(DATA[i].id); persist();
    renderDrawer();
    $('#drawer').classList.add('on');
    syncScrim();
  }
  function closeDrawer(){ $('#drawer').classList.remove('on'); syncScrim(); }
  $('#scrim').onclick = closeDrawer;
  // 兜底：点抽屉外任意处（蒙层/被蒙的控件）即关——不依赖蒙层命中，真实浏览器更稳
  document.addEventListener('pointerdown', e=>{
    if(!$('#drawer').classList.contains('on')) return;
    if(e.target.closest('.drawer')) return;   // 抽屉内部不关（点 header 工具会先关抽屉再开侧栏）
    closeDrawer();
  }, true);

  // 同款 → 关抽屉 + 画布召唤该手法的感觉词（跨器官联动）
  function summonSame(fid){
    const x = findFacet(fid); if(!x) return;
    const w = x.facet.feels[0];
    closeDrawer();
    if(w && window.__summon){ const inp=$('#q'); if(inp) inp.value=w; window.__summon(w); }
  }

  $('#close-drawer').onclick = closeDrawer;

  /* ── 右侧拉面板：已收（产出 → 给「转译」）/ 回收站（软删可找回）共用 ── */
  let sideType = null;
  const sideOpen = ()=> $('#side').classList.contains('on');
  function openSide(type){   // 仅回收站用侧栏（已收走下拉气泡）
    if(sideOpen() && sideType===type){ closeSide(); return; }
    closePickPop();          // 与已收气泡互斥
    sideType = type; renderSide();
    $('#side').classList.add('on'); $('#side-scrim').classList.add('on');
  }
  function closeSide(){ $('#side').classList.remove('on'); $('#side-scrim').classList.remove('on'); sideType=null; }
  function renderSide(){ if(sideType==='trash') renderTrashSide(); }
  function renderTrashSide(){
    $('#side').classList.add('wide');
    $('#side-title').textContent='回收站'; $('#side-n').textContent=state.trashed.size;
    $('#side-sub').textContent='软删除，原件不动，可恢复'; $('#side-clear').style.display='none'; $('#side-foot').style.display='none';
    const body=$('#side-body'); body.innerHTML='';
    if(state.trashed.size===0){ body.innerHTML='<div class="side-empty">回收站是空的</div>'; return; }
    const grid=document.createElement('div'); grid.className='trash-grid';
    [...state.trashed].forEach(eid=>{
      const e=DATA.find(x=>x.id===eid); if(!e) return;
      const c=document.createElement('div'); c.className='trash-card';
      c.innerHTML=`<div class="tc-imgwrap"><img class="tc-img" src="${e.thumb}" alt=""><button class="tc-restore">恢复</button></div><div class="tc-cap"><b>№${e.id}</b> ${e.title}</div>`;
      c.querySelector('.tc-restore').onclick=()=>restoreEntry(eid);
      grid.appendChild(c);
    });
    body.appendChild(grid);
  }

  /* ── 已收 = 下拉气泡（锚在已收钮下方）：复用 pick-row（来源缩略+中英+出处）── */
  const pickPopOpen = ()=> $('#pick-pop').classList.contains('on');
  function renderPicked(){
    $('#pick-n').textContent = state.picked.size;
    const box=$('#pick-chips'); box.innerHTML='';
    if(state.picked.size===0){ box.innerHTML='<div class="pp-empty">还没收手法<br>点画布图开抽屉，收锚点 / 手法卡</div>'; return; }
    [...state.picked].forEach(fid=>{
      const x=findFacet(fid); if(!x) return;
      const row=document.createElement('div'); row.className='pick-row';
      row.innerHTML=`<img src="${x.entry.thumb}" alt=""><div class="pr-txt"><div class="pr-zh">${x.facet.zh}</div><div class="pr-en">${x.facet.en}</div><div class="pr-src">来自 <b>№${x.entry.id}</b> ${x.entry.title}</div></div><button class="pr-x" title="移出">✕</button>`;
      row.querySelector('.pr-x').onclick=()=>togglePick(fid);
      row.onmouseenter=()=>setHot(fid,true); row.onmouseleave=()=>setHot(fid,false);
      box.appendChild(row);
    });
  }
  function openPickPop(){ closeSide(); renderPicked(); $('#pick-pop').classList.add('on'); $('#pick-btn').classList.add('open'); }
  function closePickPop(){ $('#pick-pop').classList.remove('on'); $('#pick-btn').classList.remove('open'); }
  $('#pick-btn').onclick = e=>{ e.stopPropagation(); pickPopOpen() ? closePickPop() : openPickPop(); };
  $('#pick-clear').onclick = ()=>{
    if(!state.picked.size) return;
    state.picked.clear(); persist(); scheduleDesk(); renderPicked();
    if($('#drawer').classList.contains('on')) renderDrawer();
    flash('已清空已收');
  };

  /* ── 回收站（软删除 · 可找回；画布版钩子）── */
  function syncCanvasTrash(){
    if(window.__canvasSetTrashed) window.__canvasSetTrashed([...state.trashed]);
    if(window.__canvasRelayout) window.__canvasRelayout();   // 删/恢复后即时按留下的图重排
  }
  function trashEntry(eid){
    state.trashed.add(eid); persist();
    closeDrawer(); syncCanvasTrash(); renderTrash();
    flash('已移入回收站 · 右上「回收站」可找回');
  }
  function restoreEntry(eid){
    state.trashed.delete(eid); persist();
    syncCanvasTrash(); renderTrash();
    flash('已放回画布');
  }
  function renderTrash(){
    const n = state.trashed.size;
    $('#trash-btn').classList.toggle('show', n>0);
    $('#trash-n').textContent = n;
    if(sideOpen() && sideType==='trash'){ if(n===0) closeSide(); else renderTrashSide(); }
  }
  $('#trash-btn').onclick = ()=> openSide('trash');
  $('#side-close').onclick = closeSide;
  $('#side-scrim').onclick = closeSide;
  // 兜底：点面板外任意处即关——不依赖蒙层命中，真实浏览器更稳
  document.addEventListener('pointerdown', e=>{
    if(sideOpen() && !e.target.closest('#side') && !e.target.closest('.head-tools')) closeSide();
    if(pickPopOpen() && !e.target.closest('.ht-wrap')) closePickPop();   // 气泡内/已收钮不关
  }, true);

  addEventListener('keydown', e=>{
    if(e.key!=='Escape') return;
    if(pickPopOpen()){ closePickPop(); return; }
    if(sideOpen()){ closeSide(); return; }
    if($('#drawer').classList.contains('on')) closeDrawer();
  });

  /* ── 段②：磁盘桥（File System Access API；移植自 index.html，同 idb/同 _desk.json 契约）──
       连一次 → 收的手法写仓库根目录的 _desk.json，「转译」直接读 */
  let dirHandle = null, unconnToastShown = false;
  function idb(){ return new Promise((res,rej)=>{ const r=indexedDB.open('lingganku-v3',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('kv'); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
  async function idbSet(k,v){ const db=await idb(); return new Promise((res,rej)=>{ const t=db.transaction('kv','readwrite'); t.objectStore('kv').put(v,k); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
  async function idbGet(k){ const db=await idb(); return new Promise((res,rej)=>{ const t=db.transaction('kv','readonly'); const q=t.objectStore('kv').get(k); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); }

  const connBtn = $('#conn-f'), connTxt = $('#conn-f-txt');
  { const x=document.querySelector('#conn-hint .ch-x'); if(x) x.onclick=()=>{ localStorage.setItem('cabinet.connHintDone','1'); updateConnHint(); }; }
  function updateConnHint(){
    const el = document.getElementById('conn-hint'); if(!el) return;
    const show = !CABINET_DEMO
      && !document.body.classList.contains('mode-discover')
      && !dirHandle
      && !localStorage.getItem('cabinet.connHintDone');
    el.classList.toggle('on', show);
  }
  async function refreshConn(){
    connBtn.classList.remove('live','stale');
    let ok=false;
    if(!dirHandle){ connTxt.textContent='连接'; }
    else{
      let perm='denied';
      try{ perm = await dirHandle.queryPermission({mode:'readwrite'}); }catch(e){}
      if(perm==='granted'){ connBtn.classList.add('live'); connTxt.textContent=dirHandle.name||'已连接'; ok=true; }
      else if(perm==='prompt'){ connBtn.classList.add('stale'); connTxt.textContent='重新连接'; }
      else{ connTxt.textContent='连接'; }
    }
    if(ok) localStorage.setItem('cabinet.connHintDone','1');
    updateConnHint();
    return ok;
  }
  async function tryRestore(){
    if(CABINET_DEMO) return;
    try{ dirHandle = await idbGet('dir'); if(dirHandle) await refreshConn(); }catch(e){}
  }
  connBtn.onclick = async ()=>{
    if(!window.showDirectoryPicker){ flash('请用 Chrome 打开（需要 File System Access API）'); return; }
    try{
      if(dirHandle){
        const perm = await dirHandle.queryPermission({mode:'readwrite'});
        if(perm==='prompt' && (await dirHandle.requestPermission({mode:'readwrite'}))==='granted'){
          await refreshConn(); flash('已连接 '+dirHandle.name); writeDesk(); renderTray(); return;
        }
      }
      dirHandle = await window.showDirectoryPicker({mode:'readwrite', id:'lingganku'});
      if((await dirHandle.requestPermission({mode:'readwrite'}))!=='granted'){ flash('未授权写入'); return; }
      try{ await dirHandle.getFileHandle('data-v3.js'); }
      catch(e){ flash('这不是项目根目录（缺 data-v3.js）——请选你下载的 cabinet 文件夹'); dirHandle=null; await refreshConn(); return; }
      await idbSet('dir', dirHandle);
      await refreshConn();
      flash('已连接 '+dirHandle.name);
      writeDesk();   // 连接成功立即把当前已收写一次
      renderTray();
    }catch(e){
      if(e.name==='AbortError') return;
      if(e.name==='SecurityError') flash('浏览器在 file:// 下拦了授权——跑 ./start.sh 走 localhost 打开');
      else flash('连接失败: '+e.message);
    }
  };

  // _desk.json：反范式化，每条带全字段，「转译」读 picked 无需再解析 data-v3.js（schema 与 index.html 逐字一致）
  function deskRecord(fid){
    const x = findFacet(fid); if(!x) return null;
    return {
      id: x.facet.id, zh: x.facet.zh, en: x.facet.en,
      say: x.facet.say, tune: x.facet.tune, feels: x.facet.feels.slice(),
      plate: { id: x.entry.id, title: x.entry.title }
    };
  }
  async function writeDesk(){
    if(!dirHandle) return;
    if(!(await refreshConn())) return;
    const payload = {
      updated: new Date().toISOString(),
      note: '由灵感库 index.html 自动写入。「转译」口令读 picked。',
      picked: [...state.picked].map(deskRecord).filter(Boolean)
    };
    try{
      const fh = await dirHandle.getFileHandle('_desk.json',{create:true});
      const w = await fh.createWritable(); await w.write(JSON.stringify(payload,null,2)); await w.close();
    }catch(e){}
  }
  let deskT;
  function scheduleDesk(){
    if(!dirHandle){
      if(!unconnToastShown){ unconnToastShown=true; flash('已存本机。连接文件夹（左下）后，「转译」才能读到'); }
      return;
    }
    clearTimeout(deskT); deskT = setTimeout(writeDesk, 600);
  }

  /* ── 入库托盘（⌘V/拖图 → _inbox；点「入库」写 .go 标记，watcher 起无头 session 标注上图）──
       契约与 index.html 逐字一致：_inbox/<图> + _inbox/.go */
  async function saveFile(sub, name, blob){
    const d = sub ? await dirHandle.getDirectoryHandle(sub,{create:true}) : dirHandle;
    const fh = await d.getFileHandle(name,{create:true}); const w = await fh.createWritable();
    await w.write(blob); await w.close();
  }
  async function listInbox(){
    if(!dirHandle) return null;
    if(!(await refreshConn())) return null;
    try{
      const inbox = await dirHandle.getDirectoryHandle('_inbox',{create:true}); const out=[];
      for await(const [name,h] of inbox.entries()){
        if(h.kind==='file' && /\.(png|jpe?g|webp|gif|mp4|mov|webm)$/i.test(name)){
          const f = await h.getFile();
          out.push({name, url:URL.createObjectURL(f), video:/\.(mp4|mov|webm)$/i.test(name)});
        }
      }
      return out.sort((a,b)=>a.name<b.name?-1:1);
    }catch(e){ return []; }
  }
  async function hasGo(){
    try{ const d=await dirHandle.getDirectoryHandle('_inbox'); await d.getFileHandle('.go'); return true; }
    catch(e){ return false; }
  }
  async function goStartedMs(){   // .go 文件的修改时间 = 点「入库」的时刻（刷新也不丢）
    try{ const d=await dirHandle.getDirectoryHandle('_inbox'); const f=await (await d.getFileHandle('.go')).getFile(); return f.lastModified; }
    catch(e){ return null; }
  }
  async function hasLock(){   // watcher 一跑就在仓库根建 .ingest.lock 目录（= 拆解真在进行）
    try{ await dirHandle.getDirectoryHandle('.ingest.lock'); return true; }
    catch(e){ return false; }
  }
  function ingestReqMs(){ const v=localStorage.getItem('cabinet.ingestReq'); return v? +v : null; }   // 入库意图时间戳（watcher 会很快删 .go，故不能只看 .go）
  let ingesting = false, sawLock = false;   // sawLock = 本次见过 watcher 锁（= 有自动 watcher）
  const STUCK_MIN = 12;           // 超过这么久给「重置」兜底
  const PASTE_KEY = /Mac|iPhone|iPad/.test(navigator.platform || navigator.userAgent || '') ? '⌘V' : 'Ctrl V';
  async function renderTray(){
    const tray=$('#tray'), info=$('#tray-info'), strip=$('#tray-strip'), go=$('#ingest-go');
    const items = await listInbox();
    if(items===null){ tray.classList.remove('show'); strip.innerHTML=''; go.style.display='none'; ingesting=false; return false; }
    tray.classList.add('show');   // 已连接：托盘常驻（空态也提示）
    tray.classList.toggle('empty', !items.length);   // 空态去卡片感
    if(!items.length){ localStorage.removeItem('cabinet.ingestReq'); sawLock=false; }   // 空 = 完成/无待处理
    const reqAt = items.length ? ingestReqMs() : null;
    const locked = items.length ? await hasLock() : false;
    if(locked) sawLock = true;
    const goOn = items.length ? await hasGo() : false;
    const pending = items.length>0 && (reqAt!=null || goOn || locked);   // 处理中：不只看 .go（watcher 会删它），还看锁/意图
    ingesting = pending;
    go.style.display = items.length ? '' : 'none';
    go.disabled = pending;
    go.textContent = pending ? '拆解中…' : `入库 ${items.length} 张`;
    if(!items.length){
      info.innerHTML = `<span class="cmd">${PASTE_KEY}</span> 粘贴 / 拖图 到这里入库`;
    }else if(!pending){
      info.innerHTML = `待入库 <b>${items.length}</b> 张<span class="sub">点下面「入库」开始</span>`;
    }else{
      const secs = reqAt ? Math.max(0, Math.floor((Date.now()-reqAt)/1000)) : 0;
      const elapsed = secs<60 ? `${secs}s` : `${Math.floor(secs/60)} 分钟`;
      const auto = sawLock || locked;
      const head = auto ? `自动拆解中 <b>${items.length}</b> 张` : `已入队 <b>${items.length}</b> 张 · 待拆解`;
      let body;
      if(auto){
        body = `<span class="sub">watcher 正在自动拆，约一两分钟 · 可切走做别的，完成自动上画布</span>`;
      }else if(secs>=8){
        body = `<span class="sub">没检测到自动 watcher — 在 coding agent 里运行 <b>/ingest</b> 拆解</span>`
             + `<span class="sub">想「点完即自动」？跑一次 <b>./setup/install.sh</b> 装 watcher</span>`;
      }else{
        body = `<span class="sub">拆解中…完成后自动上画布</span>`;
      }
      info.innerHTML = head + body + `<span class="sub">${elapsed}`
        + (secs>=STUCK_MIN*60 ? ` · 久无动静？看 _ingest.log 或 <a id="tray-reset">重置</a>` : '')
        + `</span>`;
      const rb = $('#tray-reset'); if(rb) rb.onclick = resetGo;
    }
    strip.innerHTML = items.map(it=>
      `<div class="pend${pending?' ing':''}" style="background-image:url('${it.url}')">${it.video?`<span>▶ 视频</span>`:''}<button class="rm" data-rm="${it.name}" title="移出待入库">✕</button></div>`).join('');
    strip.querySelectorAll('[data-rm]').forEach(b=>{ b.onclick = ()=>unstage(b.dataset.rm); });
    return pending;
  }
  async function unstage(name){
    try{ const inbox=await dirHandle.getDirectoryHandle('_inbox'); await inbox.removeEntry(name); await renderTray(); flash('已移出待入库'); }
    catch(e){ flash('移出失败: '+e.message); }
  }
  async function resetGo(){       // 卡死兜底：清掉 .go + 意图，让用户能重新触发（不中断正在跑的那轮）
    if(!(await refreshConn())) return;
    try{ const inbox=await dirHandle.getDirectoryHandle('_inbox'); await inbox.removeEntry('.go'); localStorage.removeItem('cabinet.ingestReq'); sawLock=false; flash('已重置 — 可重新点「入库」'); renderTray(); }
    catch(e){ flash('重置失败: '+e.message); }
  }
  $('#ingest-go').onclick = async ()=>{
    if(!(await refreshConn())){ flash('先点左下「连接」'); return; }
    try{
      localStorage.setItem('cabinet.ingestReq', String(Date.now())); sawLock=false;
      await saveFile('_inbox','.go',new Blob(['go']));
      flash('已入队 — 装了 watcher 会自动拆；否则在 coding agent 里运行 /ingest');
      renderTray();
    }catch(e){ flash('触发失败: '+e.message); }
  };
  async function stage(file){
    if(!window.showDirectoryPicker){ flash('请用 Chrome，并先连接文件夹'); return; }
    if(!(await refreshConn())){ flash('先点左下「连接」选文件夹'); return; }
    try{
      const ext = ((file.name||'').split('.').pop() || (file.type.split('/')[1]) || 'png').toLowerCase().replace('jpeg','jpg');
      const name = `${Date.now()}-${Math.floor(Math.random()*1000)}.${ext}`;
      await saveFile('_inbox', name, file); await renderTray();
      flash('已暂存 ✓ 攒好点「入库」');
    }catch(e){ flash('暂存失败: '+e.message); }
  }
  window.addEventListener('paste', e=>{
    if(CABINET_DEMO) return;
    const f = [...(e.clipboardData?.items||[])].find(i=>i.type.startsWith('image'));
    if(f){ e.preventDefault(); stage(f.getAsFile()); }
  });
  let dragDepth=0;
  window.addEventListener('dragenter', e=>{ e.preventDefault(); if(e.dataTransfer.types.includes('Files')){ dragDepth++; $('#drop').classList.add('on'); } });
  window.addEventListener('dragover', e=>e.preventDefault());
  window.addEventListener('dragleave', ()=>{ if(--dragDepth<=0){ dragDepth=0; $('#drop').classList.remove('on'); } });
  window.addEventListener('drop', async e=>{
    e.preventDefault(); dragDepth=0; $('#drop').classList.remove('on');
    if(CABINET_DEMO) return;
    const files = [...(e.dataTransfer.files||[])].filter(f=>/^(image|video)\//.test(f.type));
    for(const f of files){ await stage(f); }
  });

  /* 对账：入库发生在对话里（Claude 动文件系统），页面感知不到。
     切回窗口重列 _inbox；data-v3.js 变了（有新图入库）直接重载上画布。 */
  let dataSig = null;
  async function checkDataFresh(){
    if(!dirHandle) return;
    try{
      if((await dirHandle.queryPermission({mode:'readwrite'}))!=='granted') return;
      const f = await (await dirHandle.getFileHandle('data-v3.js')).getFile();
      const sig = f.size+':'+f.lastModified;
      if(dataSig===null){ dataSig = sig; return; }
      if(sig!==dataSig) location.reload();
    }catch(e){}
  }
  // 轮询：页面不再只靠失焦/聚焦才对账——连接后画布模式自轮询（入库中 12s / 空闲 60s），
  // 不切窗口也能自动刷新、完成即自动上图；不会「看着不动以为卡了」。
  let pollT=null;
  function scheduleReconcilePoll(){
    clearTimeout(pollT);
    if(!dirHandle || document.body.classList.contains('mode-discover')) return;
    pollT = setTimeout(reconcile, ingesting ? 4000 : 60000);
  }
  async function reconcile(){
    if(document.body.classList.contains('mode-discover')){ return; }   // 找灵感模式不轮询
    await renderTray(); await checkDataFresh();
    scheduleReconcilePoll();
  }
  window.addEventListener('focus', reconcile);
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) reconcile(); });
  window.__trayKick = reconcile;   // 模式切回画布时重启轮询

  tryRestore().then(()=>{ reconcile(); updateConnHint(); });
  syncCanvasTrash(); renderTrash(); renderPicked();
  if(CABINET_DEMO) initDemo();

  window.openDrawer = openDrawer;
})();
</script>

<!-- ── 模式切换 ── -->
<script>
(()=>{
  const seg = document.getElementById('seg');
  const lobes = [...seg.querySelectorAll('.lobe')];
  function setMode(mode){
    document.querySelectorAll('.mode').forEach(m=>m.classList.toggle('on', m.id==='mode-'+mode));
    lobes.forEach(b=>b.classList.toggle('on', b.dataset.mode===mode));
    document.body.classList.toggle('mode-canvas', mode==='canvas');
    document.body.classList.toggle('mode-discover', mode==='discover');
    updateConnHint();
    if(mode==='canvas'){ window.scrollTo(0,0); window.__canvasResume && window.__canvasResume(); window.__trayKick && window.__trayKick(); }
    else { window.__canvasPause && window.__canvasPause(); }
  }
  lobes.forEach(b=>{ b.onclick = ()=>setMode(b.dataset.mode); });
})();
</script>

<!-- ── 切换 metaball（JS 实时算 SVG path）：rest 两胶囊相接、hover 哪侧哪侧外拉、中间一条颈拉长成丝 ── -->
<script>
(()=>{
  const seg = document.getElementById('seg');
  const path = document.getElementById('seg-path');
  const clip = document.getElementById('seg-clip-path');
  const glow = document.getElementById('seg-glow');
  const lblL = document.querySelector('.lobe[data-mode="canvas"] .seg-lbl');
  const lblR = document.querySelector('.lobe[data-mode="discover"] .seg-lbl');
  const H=36, R=9, LW=82, GAP=1, SEP=26, NY=H/2-R, OV=R, CY=H/2, W=2*LW+GAP;  // GAP=rest相接间隙；SEP=hover外拉距离
  const REST_W=7.4, HOVER_W=6.4;                                   // 颈腰半高（粗）：rest→hover 微收，丝偏粗

  function rr(x, w){  // 满高圆角矩形子路径
    const r=R, h=H;
    return `M${x+r},0H${x+w-r}A${r},${r} 0 0 1 ${x+w},${r}V${h-r}A${r},${r} 0 0 1 ${x+w-r},${h}H${x+r}A${r},${r} 0 0 1 ${x},${h-r}V${r}A${r},${r} 0 0 1 ${x+r},0Z`;
  }
  function neck(aR, bL, wy){  // 连接颈：上下两条带水平切线的贝塞尔，中间收腰到 ±wy（拉丝）
    const x0=aR-OV, x1=bL+OV, mid=(aR+bL)/2;
    const tY=CY-NY, wT=CY-wy, bY=CY+NY, wB=CY+wy, cA=(x0+mid)/2, cB=(mid+x1)/2;
    return `M${x0},${tY}C${cA},${tY} ${cA},${wT} ${mid},${wT}C${cB},${wT} ${cB},${tY} ${x1},${tY}`+
           `L${x1},${bY}C${cB},${bY} ${cB},${wB} ${mid},${wB}C${cA},${wB} ${cA},${bY} ${x0},${bY}Z`;
  }
  let pL=0, pR=0, tgtL=0, tgtR=0, raf=null;
  function build(){
    const leftX=-SEP*pL, rightX=LW+GAP+SEP*pR;
    const aR=leftX+LW, bL=rightX, gap=bL-aR;
    const gn=Math.max(0, Math.min(1, gap/(GAP+SEP)));            // 0=相接 1=全拉开
    const wy=REST_W - (REST_W-HOVER_W)*gn;                       // 颈腰：拉长时微收，整体偏粗
    const d=rr(leftX,LW)+rr(rightX,LW)+neck(aR,bL,wy);
    path.setAttribute('d', d); clip.setAttribute('d', d);        // 光晕裁剪用同一形状
    lblL.style.transform=`translateX(${leftX}px)`;
    lblR.style.transform=`translateX(${rightX-(LW+GAP)}px)`;
  }
  function tick(){
    pL+=(tgtL-pL)*0.15; pR+=(tgtR-pR)*0.15;                      // 放慢拉丝（0.3→0.15），更柔不粗暴
    build();
    if(Math.abs(tgtL-pL)>0.002 || Math.abs(tgtR-pR)>0.002) raf=requestAnimationFrame(tick);
    else { pL=tgtL; pR=tgtR; build(); raf=null; }
  }
  const kick=()=>{ if(!raf) raf=requestAnimationFrame(tick); };

  // hover 砖红光晕：跟随鼠标（裁进胶囊形状）；hideT 兜住跨中线时 leave→enter 的瞬断
  let hideT;
  const moveGlow=e=>{
    const r=seg.getBoundingClientRect();
    glow.setAttribute('cx', (e.clientX-r.left)*(W/r.width));
    glow.setAttribute('cy', (e.clientY-r.top)*(H/r.height));
  };
  [...seg.querySelectorAll('.lobe')].forEach(b=>{
    const right=b.dataset.mode==='discover';
    b.addEventListener('mouseenter',e=>{ right?tgtR=1:tgtL=1; clearTimeout(hideT); moveGlow(e); glow.style.opacity='1'; kick(); });
    b.addEventListener('mousemove', moveGlow);
    b.addEventListener('mouseleave',()=>{ right?tgtR=0:tgtL=0; hideT=setTimeout(()=>glow.style.opacity='0',50); kick(); });
  });
  build();
})();
</script>

<!-- ── 背景网格对齐内容列（--col/--gx）+ 橡皮擦光标（rAF 节流） ── -->
<script>
(()=>{
  const md=document.querySelector('#mode-discover'); if(!md) return;
  const gb=md.querySelector('.grid-bg'), ink=md.querySelector('.ink');
  const root=document.documentElement;
  const hero=md.querySelector('.hero');
  function alignGrid(){
    const vw=innerWidth, boxW=Math.min(1180,vw), cw=boxW-112, col=cw/12, gx=(vw-boxW)/2+56;
    root.style.setProperty('--col', col+'px'); root.style.setProperty('--gx', gx+'px');
    if(hero){ const gr=gb.getBoundingClientRect(), hr=hero.getBoundingClientRect(); root.style.setProperty('--gy', (hr.top-gr.top)+'px'); }
    drawInk();
  }
  // 墨层：把每个描边格子的「框 + 四角细十字」画进 SVG（坐标相对 #mode-discover），与背景网格同坐标系
  const A=8;  // 十字臂长
  const SVGNS='http://www.w3.org/2000/svg';
  function drawInk(){
    if(!ink) return;
    const base=md.getBoundingClientRect();
    ink.setAttribute('width', base.width); ink.setAttribute('height', base.height);  // 坐标系=px 1:1
    let s='';
    md.querySelectorAll('.cell').forEach(c=>{
      const r=c.getBoundingClientRect();
      if(r.width<4||r.height<4) return;                                 // 布局未就绪，跳过
      const x=Math.round(r.left-base.left), y=Math.round(r.top-base.top), w=Math.round(r.width), h=Math.round(r.height);
      s+=`<rect x="${x}" y="${y}" width="${w}" height="${h}"/>`;
      [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([px,py])=>{ s+=`<path d="M${px-A} ${py}H${px+A}M${px} ${py-A}V${py+A}"/>`; });
    });
    ink.innerHTML=s;
  }
  alignGrid();
  addEventListener('resize', alignGrid, {passive:true});
  addEventListener('load', alignGrid);
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(alignGrid);   // 字体落位后重量
  if(window.ResizeObserver){ const ro=new ResizeObserver(()=>alignGrid()); ro.observe(md); if(hero) ro.observe(hero); }  // 布局稳定即重绘
  // 橡皮擦：坐标设在 #mode-discover（背景网格 + 墨层共享，同坐标系）→ 只擦线、文字保留
  let cx=0,cy=0,queued=false;
  const apply=()=>{ queued=false; const r=md.getBoundingClientRect(); md.style.setProperty('--mx',(cx-r.left)+'px'); md.style.setProperty('--my',(cy-r.top)+'px'); };
  addEventListener('pointermove',e=>{ cx=e.clientX; cy=e.clientY; if(!queued){ queued=true; requestAnimationFrame(apply); } },{passive:true});
})();
</script>
