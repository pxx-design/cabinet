<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>灵感库 4.0 · 画布 ⇄ 找灵感</title>
<style>
  /* ── 灵感库 4.0 外壳：一页两模式（画布·拆解 ⇄ 找灵感·上游）──
       画布 = demo-d 引力场（Canvas2D，沿用）；找灵感 = demo-e 瀑布流（沿用）
       本次只拼外壳 + 顶部切换；入库/抽屉/临摹本 等器官留下一步 */
  :root{
    --bg:#f7f5f0; --ink:#1a1a1a; --sub:#8a8478; --line:#e3dfd6; --accent:#b0402f;
    --panel:#ffffff; --pline:#d8d3c6; --chip:#efece5; --board:#ece9e2;
    --paper:#f7f5f0; --paper2:#f1eee7; --ink-soft:#6b6862; --ink-faint:#a39e93; --card:#fff;
    --serif:Georgia,"Songti SC","Noto Serif SC",serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{height:100%}
  body{
    min-height:100%; background:var(--bg); color:var(--ink);
    font-family:"PingFang SC",-apple-system,"Helvetica Neue",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  body.mode-canvas{height:100%; overflow:hidden}
  body.mode-discover{overflow-y:auto}
  a{color:inherit; text-decoration:none}

  /* ── 共享顶栏 + 模式切换 ── */
  .shell-head{
    position:fixed; inset:0 0 auto 0; height:56px; z-index:60;
    display:flex; justify-content:space-between; align-items:center; padding:0 22px;
    background:linear-gradient(rgba(247,245,240,.93), rgba(247,245,240,.80));
    backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
  }
  /* 品牌：切面宝石标记（跨语言恒定符号）+ 中文字标灵感库；英文版换 Cabinet 复用同标记 */
  .brand{display:flex; align-items:center; gap:10px; text-decoration:none}
  .brand-mark{flex:none; display:block}
  .brand-name{font-family:var(--serif); font-size:19px; font-weight:500; letter-spacing:.06em; color:var(--ink)}
  .brand-name b{color:var(--accent); font-weight:700}
  /* 顶部切换：JS 实时算 SVG path metaball（floema 真方案）— 居中；rest 两胶囊相接（不相交），hover 拉丝长颈；脆角；选中=文字下朱砂点 */
  .seg{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:165px; height:36px; pointer-events:none}
  .seg-svg{position:absolute; inset:0; width:165px; height:36px; overflow:visible}
  #seg-path{fill:#ffffff}
  #seg-glow{transition:opacity .25s}   /* hover 砖红光晕，位置随鼠标（JS 设 cx/cy），裁进胶囊形状 */
  /* 命中区固定不动（修中点抖动）；只让里面文字位移，由 JS 逐帧驱动与 path 同步 */
  .lobe{
    pointer-events:auto; position:absolute; top:0; height:36px; width:50%; z-index:2;
    border:none; background:none; cursor:pointer; padding:0;
  }
  .lobe[data-mode="canvas"]{left:0}
  .lobe[data-mode="discover"]{right:0}
  .seg-lbl{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font:inherit; font-size:13px; font-weight:400; letter-spacing:.04em; color:#241f21;
    pointer-events:none; will-change:transform;
  }
  .lobe.on .seg-lbl{font-weight:500}
  /* 选中态：文字正下方一个朱砂点（非光晕），随文字平移 */
  .seg-dot{position:absolute; left:50%; bottom:4px; transform:translate(-50%,3px); opacity:0;
    width:4px; height:4px; border-radius:50%; background:var(--accent);
    transition:transform .22s cubic-bezier(.22,.9,.32,1), opacity .2s}
  .lobe.on .seg-dot{opacity:1; transform:translate(-50%,0)}

  /* ── 模式容器 ── */
  .mode{display:none}
  .mode.on{display:block}

  /* ════════ 模式 A：画布（demo-d 引力场）════════ */
  canvas#cv{position:fixed; inset:0; display:block; cursor:grab; z-index:1}
  canvas#cv.dragging{cursor:grabbing}

  #summon{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
    z-index:45; display:flex; align-items:center; gap:8px;
    width:430px; padding:11px 16px;
    background:rgba(255,255,255,.92); border:1px solid var(--pline); border-radius:12px;
    box-shadow:0 4px 20px rgba(26,26,26,.06); backdrop-filter:blur(10px);
    transition:border-color .25s, box-shadow .25s;
  }
  #summon:focus-within{border-color:var(--accent); box-shadow:0 0 22px rgba(176,64,47,.14)}
  #summon svg{flex:none; opacity:.5}
  #summon input{flex:1; background:none; border:none; outline:none; font:inherit; font-size:14px; color:var(--ink); letter-spacing:.03em}
  #summon input::placeholder{color:#b3ac9f}
  #summon .x{flex:none; cursor:pointer; border:none; background:none; color:var(--sub); font-size:14px; padding:2px 4px; display:none}
  #summon.live .x{display:block}
  #summon .n{flex:none; font-size:11px; color:var(--accent); letter-spacing:.06em; display:none; white-space:nowrap}
  #summon.live .n{display:block}

  #fbar{
    position:fixed; left:50%; bottom:88px; transform:translateX(-50%);
    z-index:44; max-width:760px; padding:12px 18px;
    background:rgba(255,255,255,.96); border:1px solid var(--pline); border-radius:12px;
    font-size:12.5px; line-height:1.7; color:var(--ink);
    opacity:0; pointer-events:none; transition:opacity .25s;
  }
  #fbar.on{opacity:1}
  #fbar .say{color:var(--ink)}
  #fbar .tune{color:var(--sub); font-size:11.5px}
  #fbar .tune b{color:var(--accent); font-weight:600}

  /* 操作提示：默认只是右下角一个弱 ? 徽标，hover 才向左展开完整提示（.off 已废，旧调用成无害空操作）*/
  #hint{
    position:fixed; right:22px; bottom:26px; z-index:45;
    display:flex; align-items:center; justify-content:flex-end;
  }
  /* ? = 幽灵次级：裸字，hover 才出底色（同回收站，floema 模式）*/
  #hint .hq{
    flex:none; width:26px; height:26px; border-radius:50%;
    background:none; border:1px solid transparent;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; color:var(--ink-faint); cursor:default; transition:color .2s, background .2s;
  }
  #hint:hover .hq{background:rgba(255,255,255,.95); color:var(--accent)}
  #hint .ht{
    max-width:0; overflow:hidden; white-space:nowrap; opacity:0; padding:0;
    margin-right:8px; line-height:26px; font-size:11.5px; color:var(--sub); letter-spacing:.04em;
    background:rgba(255,255,255,.92); border-radius:999px; backdrop-filter:blur(10px);
    transition:max-width .35s cubic-bezier(.16,1,.3,1), opacity .25s, padding .35s;
  }
  #hint:hover .ht{max-width:440px; opacity:1; padding:0 14px; border:1px solid var(--line)}

  /* 磁盘桥连接钮（左下；纯白实底无描边，跟胶囊/已收同材质；带状态点）*/
  #conn-f{
    position:fixed; left:22px; bottom:31px; z-index:45;   /* bottom 31：中线对齐底部搜索框(中线距底~49) */
    display:inline-flex; align-items:center; gap:8px;
    padding:8px 14px; font:inherit; font-size:12.5px; color:var(--ink-soft); letter-spacing:.02em;
    background:#fff; border:none; border-radius:9px;
    cursor:pointer; transition:color .2s;
  }
  #conn-f:hover{color:var(--ink)}
  /* 文件夹图标本身做状态指示：未连灰、已连绿、需重连朱砂 */
  #conn-f .conn-ico{flex:none; color:#b3ac9f; transition:color .2s}
  #conn-f.live{color:var(--ink)}
  #conn-f.live .conn-ico{color:#4a9e6d}
  #conn-f.stale .conn-ico{color:var(--accent)}
  /* 未链接强提示：脉冲红点（连上=live / 需重连=stale 即隐——stale 本身已是红图标）*/
  #conn-f::before, #conn-f::after{
    content:''; position:absolute; top:-2px; right:-2px;
    width:8px; height:8px; border-radius:50%; background:var(--accent);
  }
  #conn-f::after{ box-shadow:0 0 0 2px #fff }                                 /* 实心点 + 白环抬起 */
  #conn-f::before{ opacity:.55; animation:connpulse 2s ease-out infinite }   /* 向外扩散的涟漪 */
  #conn-f.live::before, #conn-f.live::after,
  #conn-f.stale::before, #conn-f.stale::after{ display:none }
  @keyframes connpulse{ 0%{transform:scale(1);opacity:.55} 70%,100%{transform:scale(2.6);opacity:0} }
  body.mode-discover #conn-f{display:none}

  /* 首次连接引导气泡：仅未连接·首次出现，连上 / 点✕ 即永久消失，不常驻 */
  #conn-hint{ display:none; position:fixed; left:20px; bottom:78px; z-index:46;
    width:228px; background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:13px 15px 12px; box-shadow:0 10px 30px rgba(26,26,26,.12);
    font-size:12.5px; line-height:1.55; color:var(--ink) }
  #conn-hint.on{ display:block; animation:hintIn .26s ease-out }
  #conn-hint::after{ content:''; position:absolute; left:24px; bottom:-6px; width:12px; height:12px;
    background:#fff; border-right:1px solid var(--line); border-bottom:1px solid var(--line); transform:rotate(45deg) }
  #conn-hint .ch-t{ font-weight:600; margin:0 0 6px; padding-right:14px }
  #conn-hint .ch-s{ margin:0; padding-left:17px; color:var(--ink-soft) }
  #conn-hint .ch-s b{ color:var(--accent); font-weight:600 }
  #conn-hint .ch-x{ position:absolute; top:7px; right:8px; border:0; background:none; cursor:pointer;
    color:#b3ac9f; font-size:12px; line-height:1; padding:2px }
  #conn-hint .ch-x:hover{ color:var(--ink) }
  @keyframes hintIn{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
  body.mode-discover #conn-hint, html.demo #conn-hint{ display:none !important }

  /* ════ 演示模式（Vercel / ?demo=1）：隐写盘/编辑动作，只留纯浏览功能 ════ */
  html.demo #conn-f, html.demo #tray, html.demo #drop,
  html.demo #plate-cal, html.demo #plate-trash, html.demo #trash-btn{ display:none !important; }
  /* 下载 CTA — 品牌右侧、｜ 隔开（brand-group 内 in-flow；metaball 绝对居中不受影响） */
  .brand-group{ display:flex; align-items:center }
  #demo-cta{ display:none; }
  html.demo #demo-cta{
    display:inline-flex; align-items:center; margin-left:14px; white-space:nowrap;
    font:inherit; font-size:12.5px; color:var(--ink-soft); letter-spacing:.02em;
    cursor:pointer; text-decoration:none; transition:color .2s;
  }
  html.demo #demo-cta::before{ content:'｜'; color:var(--ink-faint); margin-right:12px; font-size:13px }
  html.demo #demo-cta:hover{ color:var(--ink) }
  #demo-cta b{ color:var(--accent); font-weight:600 }
  html.demo #demo-cta:hover b{ text-decoration:underline }
  /* 演示模式：图片免责声明 — 左下页脚，极淡、不抢 */
  #demo-note{ display:none }
  html.demo #demo-note{
    display:block; position:fixed; left:22px; bottom:18px; z-index:43;
    font-size:11px; color:var(--ink-faint); letter-spacing:.02em; pointer-events:none;
  }
  /* 已收气泡底部 → 漏斗：pitch + 去获取按钮 */
  html.demo .pp-foot{ display:flex; flex-direction:column; gap:8px; align-items:stretch }
  .pp-pitch{ font-size:11.5px; color:var(--ink-soft); line-height:1.55 }
  .pp-get{ text-align:center; padding:8px 0; background:var(--accent); color:#fff; border-radius:7px; font-size:12px; text-decoration:none; letter-spacing:.02em; transition:opacity .15s }
  .pp-get:hover{ opacity:.88 }

  /* ── header 右上工具区：已收（产出）+ 回收站（软删可找回），共用样式 ── */
  .head-tools{display:flex; align-items:center; gap:8px}
  body.mode-discover .head-tools{display:none}
  /* 全局控件系统：圆角 9px、无投影（投影只给搜索）；按重要度分档 */
  .head-btn{
    display:inline-flex; align-items:center; gap:6px;
    border:none; background:none; cursor:pointer;
    font:inherit; font-size:12.5px; color:var(--ink-soft); letter-spacing:.02em;
    padding:7px 12px; border-radius:9px; transition:color .2s, background .2s;
  }
  .head-btn b{font-variant-numeric:tabular-nums}
  /* 已收 = 无底色文字 + chevron 指示展开态（展开时翻 180°）；hover/展开 转朱砂 */
  #pick-btn{color:var(--ink); gap:5px}
  #pick-btn b{color:var(--accent); font-weight:600; margin:0 1px}
  #pick-btn:hover, #pick-btn.open{color:var(--accent)}
  #pick-btn .chev{opacity:.5; transition:transform .25s, opacity .2s}
  #pick-btn:hover .chev, #pick-btn.open .chev{opacity:.9}
  #pick-btn.open .chev{transform:rotate(180deg)}
  /* 已收下拉气泡：锚在已收钮下方；纯白+描边+blur，不靠投影 */
  .ht-wrap{position:relative}
  .pick-pop{
    position:absolute; top:calc(100% + 9px); right:0; z-index:62; width:330px; max-height:62vh; overflow-y:auto;
    background:rgba(255,255,255,.98); border:1px solid var(--pline); border-radius:13px; backdrop-filter:blur(12px);
    padding:8px; display:none; flex-direction:column;
  }
  .pick-pop.on{display:flex}
  .pp-head{display:flex; align-items:center; justify-content:space-between; font-size:11.5px; color:var(--ink-soft); padding:4px 6px 8px}
  .pp-clear{border:none; background:none; cursor:pointer; font:inherit; font-size:11.5px; color:var(--ink-faint); padding:2px 4px}
  .pp-clear:hover{color:var(--accent)}
  .pp-foot{font-size:11px; color:var(--ink-faint); padding:9px 6px 2px; border-top:1px solid var(--line); margin-top:2px}
  .pp-empty{font-size:12.5px; color:var(--ink-faint); text-align:center; padding:26px 12px; line-height:1.8}
  /* 回收站 = 幽灵次级：裸 icon，hover 才出底色 + 数字（floema 搜索 icon 模式）*/
  #trash-btn{display:none; color:var(--ink); padding:7px 9px}
  #trash-btn.show{display:inline-flex}
  #trash-btn svg{opacity:1}
  #trash-btn b{display:none; color:var(--accent); margin-left:1px}
  #trash-btn:hover{background:#fff; color:var(--ink)}
  #trash-btn:hover b{display:inline}
  /* ── 右侧拉面板：已收 / 回收站 共用（与 940 抽屉同种右滑语言；蒙层分隔、无投影）── */
  #side-scrim{position:fixed; top:56px; left:0; right:0; bottom:0; z-index:54;
    background:rgba(20,18,15,.40); opacity:0; pointer-events:none; transition:opacity .25s}
  #side-scrim.on{opacity:1; pointer-events:auto}
  #side{
    position:fixed; top:56px; right:0; bottom:0; z-index:55; width:380px; max-width:88vw;
    background:var(--card); border-left:1px solid var(--line);
    display:flex; flex-direction:column;
    transform:translateX(100%); visibility:hidden;
    transition:transform .36s cubic-bezier(.16,1,.3,1), visibility 0s .36s;
  }
  #side.on{transform:none; visibility:visible; transition:transform .36s cubic-bezier(.16,1,.3,1)}
  #side.wide{width:380px}   /* 回收站：2 列缩略图，窄面板 */
  .side-head{display:flex; align-items:center; gap:8px; padding:15px 16px 12px; border-bottom:1px solid var(--line)}
  .side-head .st{font-size:14px; font-weight:600; color:var(--ink); flex:none}
  .side-head .sn{font-size:12px; color:var(--accent); font-variant-numeric:tabular-nums; flex:none}
  .side-head .sub{flex:1; font-size:11px; color:var(--ink-faint); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .side-clear{border:none; background:none; cursor:pointer; font:inherit; font-size:12px; color:var(--ink-faint); padding:2px 4px; flex:none}
  .side-clear:hover{color:var(--accent)}
  .side-close{border:1px solid var(--line); background:var(--card); cursor:pointer; width:28px; height:28px; border-radius:8px; font-size:12px; color:var(--ink-soft); flex:none}
  .side-close:hover{border-color:#cfc9bd; color:var(--ink)}
  .side-body{flex:1; min-height:0; overflow-y:auto; padding:10px 12px 22px}
  .side-foot{font-size:11px; color:var(--ink-faint); padding:10px 16px; border-top:1px solid var(--line)}
  .side-empty{font-size:12.5px; color:var(--ink-faint); text-align:center; padding:46px 16px; line-height:1.8}
  /* 已收：来源缩略 + 中英文 + 来自哪版（轻清单，无逐行盒子）*/
  .pick-row{display:flex; align-items:center; gap:11px; padding:9px 6px; border-radius:9px; transition:background .15s}
  .pick-row:hover{background:var(--paper2)}
  .pick-row img{width:54px; height:40px; object-fit:cover; border-radius:6px; flex:none; border:1px solid var(--line)}
  .pick-row .pr-txt{flex:1; min-width:0}
  .pick-row .pr-zh{font-size:13.5px; color:var(--ink); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .pick-row .pr-en{font-size:11px; color:var(--ink-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:1px}
  .pick-row .pr-src{font-size:11px; color:var(--ink-soft); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .pick-row .pr-src b{color:var(--accent); font-weight:500}
  .pick-row .pr-x{flex:none; border:none; background:none; cursor:pointer; font-size:14px; color:var(--ink-faint); padding:4px 6px; align-self:flex-start}
  .pick-row .pr-x:hover{color:var(--accent)}
  /* 回收站：2 列大缩略图；恢复 = hover 浮在图上（画廊式，不再占整行）*/
  .trash-grid{display:grid; grid-template-columns:1fr 1fr; gap:13px}
  .trash-card{display:flex; flex-direction:column; gap:6px}
  .tc-imgwrap{position:relative}
  .trash-card .tc-img{display:block; width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:8px; border:1px solid var(--line); background:var(--paper2); transition:filter .15s}
  .trash-card:hover .tc-img{filter:brightness(.6)}
  .trash-card .tc-restore{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    display:none; align-items:center; white-space:nowrap;
    border:none; cursor:pointer; font:inherit; font-size:12px; color:var(--ink);
    background:rgba(255,255,255,.95); padding:6px 15px; border-radius:8px;
  }
  .trash-card:hover .tc-restore{display:inline-flex}
  .trash-card .tc-restore:hover{color:var(--accent)}
  .trash-card .tc-cap{font-size:11.5px; color:var(--ink-soft); line-height:1.4;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .trash-card .tc-cap b{color:var(--accent)}
  /* 抽屉里的删除按钮（和校准成对）*/
  .plate-trash{
    border:none;background:none;cursor:pointer;color:var(--ink-faint);
    padding:2px 6px;line-height:1;display:inline-flex;align-items:center;gap:4px;font-size:11.5px;flex:none;
  }
  .plate-trash:hover{color:var(--accent)}

  /* ── 入库托盘面板（⌘V/拖图 → _inbox；左下，浮在连接钮上方、沿底向上长；无投影）── */
  #tray{
    position:fixed; left:22px; bottom:72px; z-index:44; width:240px;
    display:none; flex-direction:column; gap:9px; padding:12px;
    background:rgba(255,255,255,.94); border:1px solid var(--pline); border-radius:13px;
    backdrop-filter:blur(12px);
  }
  #tray.show{display:flex}
  body.mode-discover #tray{display:none}
  /* 空态：去掉卡片/按钮感，只剩一行淡提示 */
  #tray.empty{background:none; border:none; backdrop-filter:none; padding:4px 2px; gap:0}
  #tray.empty .tray-info{color:var(--ink-faint)}
  #tray .tray-info{font-size:12px; color:var(--ink-soft); line-height:1.5}
  #tray .tray-info b{color:var(--accent); font-variant-numeric:tabular-nums}
  #tray .tray-info a{color:var(--accent); cursor:pointer; text-decoration:underline}
  #tray .tray-info .sub{display:block; font-size:11px; color:var(--ink-faint); margin-top:3px; line-height:1.45}
  #tray .tray-info .cmd{
    background:var(--chip); border:1px solid var(--line); border-radius:6px;
    padding:1px 6px; margin:0 1px; color:var(--ink); font-size:11px;
  }
  #tray-strip{display:flex; flex-wrap:wrap; gap:7px}
  #tray-strip:empty{display:none}
  .pend{
    width:50px; height:50px; flex:none; border-radius:9px;

    position:relative; filter:grayscale(.4) opacity(.9);

  .pend span{
    position:absolute; left:0; right:0; bottom:0; border-radius:0 0 7px 7px;

  }
  .pend .rm{
    position:absolute; top:-6px; right:-6px; width:17px; height:17px; border-radius:50%;

    display:none; align-items:center; justify-content:center; padding:0;
  }
  .pend:hover .rm{display:flex}
  .pend .rm:hover{background:var(--accent)}
  .pend.ing{filter:grayscale(.6) brightness(.62); animation:pend-pulse 1.5s ease-in-out infinite}
  .pend.ing .rm{display:none!important}
  .pend.ing::after{
    content:''; position:absolute; top:50%; left:50%; width:18px; height:18px; margin:-9px 0 0 -9px;
    border-radius:50%; border:2px solid rgba(255,255,255,.32); border-top-color:#fff;
    animation:pend-spin .7s linear infinite;
  }
  @keyframes pend-spin{to{transform:rotate(360deg)}}
  @keyframes pend-pulse{0%,100%{opacity:1}50%{opacity:.72}}
  #ingest-go{
    align-self:stretch; border:none; cursor:pointer; font:inherit; font-size:12.5px; font-weight:500;
    color:#fff; background:var(--accent); padding:8px 16px; border-radius:10px; transition:.15s;
  }
  #ingest-go:hover{filter:brightness(1.08)}
  #ingest-go:disabled{opacity:.55; cursor:default}
  /* 全屏拖放暂存 overlay */
  #drop{
    position:fixed; inset:56px 0 0; z-index:120; display:none;

  /* ── 940 抽屉器官（从 index.html 移植；段①只读查看 + 本地收存）── */
  .scrim{
    position:fixed;top:56px;left:0;right:0;bottom:0;z-index:48;pointer-events:none;
    background:rgba(20,18,15,.42);opacity:0;transition:opacity .25s;
  }
  .scrim.on{opacity:1;pointer-events:auto}   /* z-48：盖住底部控件(连接/托盘/搜索 z44-45)，可点击关抽屉 */
  .drawer{
    position:fixed;top:56px;right:0;bottom:0;z-index:50;
    width:min(940px,78%);
    background:var(--card);border-left:1px solid var(--line);
    border-radius:14px 0 0 14px;
    box-shadow:-22px 0 52px rgba(0,0,0,.16);
    display:grid;grid-template-columns:minmax(0,1fr) 350px;
    transform:translateX(40px);opacity:0;visibility:hidden;
    transition:transform .44s cubic-bezier(.16,1,.3,1),opacity .34s ease,width .3s ease,visibility 0s .44s;
  }
  .drawer.wide{width:min(1280px,92%)}
  .drawer.on{transform:none;opacity:1;visibility:visible;
    transition:transform .44s cubic-bezier(.16,1,.3,1),opacity .3s ease,width .3s ease}
  .drawer-close{
    position:absolute;top:14px;left:14px;z-index:6;
    border:1px solid var(--line);background:var(--card);cursor:pointer;
    width:30px;height:30px;border-radius:9px;font-size:12px;color:var(--ink-soft);
  }
  .drawer-close:hover{border-color:#cfc9bd;color:var(--ink)}
  .stage{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px 26px 16px;min-width:0;min-height:0;gap:12px;
    background:var(--paper);border-radius:14px 0 0 14px;
  }
  .swatches{display:flex;gap:6px}
  .sw{width:18px;height:18px;border-radius:6px;cursor:pointer;padding:0;
    border:1px solid rgba(0,0,0,.10);transition:transform .12s}
  .sw:hover{transform:scale(1.2)}
  .plate-wrap{position:relative;flex:1;min-height:0;width:100%;
    display:flex;align-items:center;justify-content:center}
  .plate{display:inline-block;padding:8px;background:#fff;
    border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 40px rgba(0,0,0,.10)}
  .plate-inner{position:relative;display:block;margin:0 auto;line-height:0;
    aspect-ratio:var(--ar,1.6);max-width:100%;max-height:calc(100vh - 56px - 84px - 120px)}
  .plate img{display:block;width:100%;height:100%;border-radius:6px;
    user-select:none;-webkit-user-drag:none}
  .anchor{position:absolute;transform:translate(-50%,-50%);z-index:5;cursor:pointer}
  .anchor .dot{
    position:relative;z-index:2;width:21px;height:21px;border-radius:50%;
    background:rgba(255,255,255,.96);border:1.6px solid var(--accent);
    color:var(--accent);font-size:11.5px;font-weight:600;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 5px rgba(0,0,0,.18);
    transition:transform .15s,background .15s,color .15s;
    animation:anchor-breathe 2.6s ease-in-out infinite;
  }
  @keyframes anchor-breathe{
    0%{box-shadow:0 1px 5px rgba(0,0,0,.18),0 0 0 0 rgba(176,64,47,.38)}
    70%{box-shadow:0 1px 5px rgba(0,0,0,.18),0 0 0 7px rgba(176,64,47,0)}
    100%{box-shadow:0 1px 5px rgba(0,0,0,.18),0 0 0 0 rgba(176,64,47,0)}
  }
  .anchor .tag{
    position:absolute;z-index:1;left:10px;top:50%;transform:translateY(-50%);
    height:21px;display:flex;align-items:center;
    background:var(--accent);color:#fff;white-space:nowrap;border-radius:0 11px 11px 0;
    font-size:11.5px;padding:0 11px 0 18px;
    max-width:0;opacity:0;overflow:hidden;pointer-events:none;
    transition:max-width .26s cubic-bezier(.2,.8,.2,1),opacity .18s,padding .26s;
  }
  .anchor:hover{z-index:6}
  .anchor.hot{z-index:6}
  .anchor:hover .dot,.anchor.hot .dot{animation:none;transform:scale(1.1);background:var(--accent);color:#fff}
  .anchor:hover .tag,.anchor.hot .tag{max-width:280px;opacity:1}
  .anchor.picked .dot{background:var(--accent);color:#fff;animation:none}
  .anchor.flip .tag{left:auto;right:10px;border-radius:11px 0 0 11px;padding:0 18px 0 11px}
  .plate-caption{
    font-size:12px;color:var(--ink-soft);display:flex;gap:10px;align-items:center;
    font-variant-numeric:tabular-nums;flex-wrap:nowrap;
  }
  .plate-caption>span{white-space:nowrap;flex:none}
  .plate-caption .cap-gap{flex:1 1 auto;min-width:8px}
  .plate-caption .no{color:var(--accent);font-weight:600}
  /* 校准模式：拖圆点改 at，松手写回 data-v3.js（移植自 index.html）*/
  .plate-cal{
    border:none;background:none;cursor:pointer;color:var(--ink-faint);
    padding:2px 6px;line-height:1;display:inline-flex;align-items:center;gap:4px;font-size:11.5px;flex:none;
  }
  .plate-cal:hover{color:var(--accent)}
  .plate-cal.on{color:var(--accent);font-weight:600}
  .plate.calibrating{outline:2px dashed rgba(176,64,47,.45);outline-offset:4px}
  .anchor.cal{z-index:7}
  .anchor.cal .dot{cursor:grab;animation:none;box-shadow:0 0 0 3px rgba(176,64,47,.22),0 2px 7px rgba(0,0,0,.28)}
  .anchor.cal .dot:active{cursor:grabbing}
  .nav-arrows{display:flex;gap:5px}
  .nav-arrows button{
    border:1px solid var(--line);background:var(--card);cursor:pointer;
    font:inherit;font-size:13px;padding:3px 12px;border-radius:8px;color:var(--ink-soft);transition:.15s;
  }
  .nav-arrows button:hover{background:var(--ink);border-color:var(--ink);color:#fff}
  .panel{border-left:1px solid var(--line);overflow-y:auto;padding:24px 22px 30px;min-height:0}
  .panel-meta{font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .panel h2{font-size:19px;font-weight:600;margin:6px 0 12px;line-height:1.4}
  .feel-line{
    display:flex;flex-wrap:wrap;align-items:center;gap:6px;
    padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:4px;
  }
  .feel-line .lab{font-size:12px;color:var(--ink-soft);margin-right:4px}
  .feel-hint{width:100%;font-size:11.5px;color:var(--ink-faint);margin-top:6px}
  .feel{border:1px solid var(--line);background:var(--paper);cursor:pointer;font:inherit;
    font-size:12.5px;color:var(--ink);padding:3px 12px;border-radius:999px;transition:.15s}
  .feel:hover{border-color:var(--accent);color:var(--accent);background:rgba(176,64,47,.06)}
  .move{
    display:grid;grid-template-columns:28px 1fr auto;gap:3px 10px;
    padding:14px 6px 13px 2px;border-bottom:1px solid var(--line);
    cursor:pointer;align-items:center;
  }
  .move:hover,.move.hot{background:var(--paper)}
  .move .num{
    grid-row:span 3;font-size:12px;font-weight:600;color:var(--accent);
    border:1.5px solid var(--accent);border-radius:50%;
    width:22px;height:22px;display:flex;align-items:center;justify-content:center;
    align-self:start;margin-top:4px;font-variant-numeric:tabular-nums;
  }
  .move.picked .num{background:var(--accent);color:#fff}
  .move .zh{font-size:14.5px;font-weight:600}
  .move .acts{display:flex;align-items:center;gap:5px;white-space:nowrap;justify-self:end}
  .move .act{
    width:26px;height:26px;padding:0;border-radius:7px;
    border:1px solid var(--line);background:var(--card);cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;
    color:var(--ink-soft);text-decoration:none;transition:.15s;
  }
  .move .act:hover{border-color:#cfc9bd;color:var(--ink)}
  .move .act.pick.on{background:rgba(176,64,47,.10);border-color:var(--accent);color:var(--accent)}
  .move .en{grid-column:2/4;font-size:12px;color:var(--ink-soft)}
  .move .mech{grid-column:2/4;font-size:12.5px;line-height:1.7;color:var(--ink-soft);margin-top:2px}
  .toast{
    position:fixed;left:50%;top:70px;transform:translateX(-50%);z-index:200;
    background:var(--ink);color:#fff;border-radius:10px;
    font-size:13px;padding:9px 16px;display:none;max-width:80vw;text-align:center;
  }
  .toast.on{display:block}

  /* ════════ 模式 B：找灵感（demo-e 瀑布流）════════ */
  #mode-discover{position:relative; --mx:-300px; --my:-300px; --er:88px}  /* 橡皮擦坐标/半径，背景网格+墨层共享 */
  /* 背景网格：12 列线格网（--col/--gx 由 JS 按内容列对齐），随内容滚动 */
  .grid-bg{position:absolute; inset:0; z-index:0; pointer-events:none;
    --gl:rgba(120,104,70,.16);
    background-image:
      linear-gradient(90deg, var(--gl) .6px, transparent .6px),
      linear-gradient(0deg,  var(--gl) .6px, transparent .6px);
    background-size: var(--col,89px) var(--col,89px);
    background-position: var(--gx,0) var(--gy,0);   /* 行原点对齐第一个模块顶（JS 设 --gy）*/
    -webkit-mask-image:radial-gradient(circle var(--er) at var(--mx) var(--my), transparent 0, transparent 52%, #000 100%);
    mask-image:radial-gradient(circle var(--er) at var(--mx) var(--my), transparent 0, transparent 52%, #000 100%)}
  /* 墨层（在文字之下、网格之上）：每个格子的「纸底填充 + 框 + 四角细十字」都画这（JS 按各格位置生成），与背景网格共用同一橡皮擦 → 擦线不碰文字 */
  .ink{position:absolute; inset:0; z-index:1; pointer-events:none; overflow:visible;
    -webkit-mask-image:radial-gradient(circle var(--er) at var(--mx) var(--my), transparent 0, transparent 52%, #000 100%);
    mask-image:radial-gradient(circle var(--er) at var(--mx) var(--my), transparent 0, transparent 52%, #000 100%)}
  .ink rect{fill:var(--paper); stroke:var(--line); stroke-width:1}   /* 纸底盖住格内网格 + 描边 */
  .ink path{fill:none; stroke:var(--ink-faint); stroke-width:1}      /* 四角十字 */
  .wrap{max-width:1180px; margin:0 auto; padding:0 56px; position:relative; z-index:2}
  /* 文字格：透明浮在墨层之上（纸底/框由墨层提供），文字本身不被橡皮擦碰 */
  .cell{position:relative}

  /* hero 模块 = 模数栅格（12 列 × 方格行）；eyebrow 自由，标题进描边格子（咬合网格） */
  .hero{display:grid; grid-template-columns:repeat(12,1fr); grid-auto-rows:var(--col,89px); margin-top:var(--col,89px)}
  .hero .eyebrow{grid-column:1/6; grid-row:1; align-self:center; display:inline-flex; align-items:center; gap:11px; font-family:var(--mono); font-size:11.5px; color:var(--accent); letter-spacing:.24em; text-transform:uppercase}
  .hero .eyebrow::before{content:''; width:26px; height:1px; background:var(--accent); opacity:.55}
  .hero .title-cell{grid-column:1/9; grid-row:2/4; display:flex; align-items:center; padding:0 38px}  /* 标题描边格子（8 列 × 2 行）*/
  .hero h1{margin:0; font-family:var(--serif); font-weight:600; font-size:64px; line-height:1.1; letter-spacing:.01em; color:var(--ink)}
  .hero p{grid-column:1/9; grid-row:4; align-self:center; font-size:15.5px; color:var(--sub); line-height:1.6; white-space:nowrap}
  .hero p b{color:var(--ink); font-weight:600}

  .zone{padding:64px 0 8px}
  .zone-head{display:flex; align-items:baseline; gap:16px; padding-bottom:8px}  /* 去下划线：和格网打架 */
  .zone-head h3{font-family:var(--serif); font-size:25px; font-weight:600; letter-spacing:.01em}
  .zone-head .cnt{font-family:var(--mono); font-size:11.5px; color:var(--sub); letter-spacing:.08em}
  .zone-head .ln{flex:1}
  /* 分组小标签：单站里「品牌站 N / 作品集 N」的信息点 */
  .zone-head .grp-inline{font-family:var(--mono); font-size:11.5px; color:var(--sub); letter-spacing:.06em; margin-left:6px}
  .zone-head .grp-inline b{color:var(--accent); font-weight:600}

  /* editorial 行 */
  /* 综合行 = 12 列栅格：图块占 6 列、文字格占 5 列（中间留 1 列做栏间格线），偶数行左右互换 */
  .row{display:grid; grid-template-columns:repeat(12,1fr); align-items:center; padding:54px 0}
  .shot{grid-column:1/7; grid-row:1; display:block; padding:16px; background:var(--board); border-radius:4px}
  .info{grid-column:8/13; grid-row:1; padding:30px 32px}  /* 文字格内距：文字离边有距离 */
  .row:nth-of-type(even) .shot{grid-column:7/13}
  .row:nth-of-type(even) .info{grid-column:1/6}
  .frame{position:relative; aspect-ratio:4/3; overflow:hidden; background:#fff; border:1px solid rgba(26,26,24,.07); border-radius:2px}
  .frame img, .frame .mv{width:100%; height:100%; object-fit:cover; object-position:top center; display:block}
  .veil{position:absolute; inset:0; background:rgba(22,20,18,.64); opacity:0; transition:opacity .3s;
        display:flex; flex-direction:column; align-items:center; justify-content:center; gap:11px; color:#fff; text-align:center; padding:22px}
  .row .shot:hover .veil, .art:hover .veil, .mcard:hover .veil{opacity:1}
  .veil .vk{font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; opacity:.85}
  .veil .vn{font-family:var(--serif); font-size:24px; font-weight:600; line-height:1.12}
  .veil .vd{font-size:12.5px; line-height:1.55; opacity:.85; max-width:82%;
            display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden}
  .veil .vh{font-family:var(--mono); font-size:10.5px; letter-spacing:.08em; opacity:.62}
  .veil .vgo{font-family:var(--mono); font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; margin-top:4px; padding:9px 18px; border:1px solid rgba(255,255,255,.72); border-radius:2px}
  .mcard .veil{gap:9px; padding:18px} .mcard .veil .vd{-webkit-line-clamp:4; font-size:12px}
  .art .veil{gap:8px; padding:16px} .art .veil .vn{font-size:20px} .art .veil .vd{-webkit-line-clamp:2; font-size:12px; max-width:90%}
  /* 小画框（上架小图 + 钉墙招贴）：hover 文字按比例缩小，去掉 host，desc 收一行 */
  .art--sm .veil, .pin .veil{gap:5px; padding:11px}
  .art--sm .veil .vk, .pin .veil .vk{font-size:9px; letter-spacing:.1em}
  .art--sm .veil .vn, .pin .veil .vn{font-size:14px; line-height:1.1}
  .art--sm .veil .vd, .pin .veil .vd{font-size:10.5px; -webkit-line-clamp:2; line-height:1.4}
  .art--sm .veil .vh, .pin .veil .vh{display:none}
  .art--sm .veil .vgo, .pin .veil .vgo{font-size:9.5px; padding:6px 12px; margin-top:2px}
  .info{flex:1; min-width:0}
  .tagline{font-family:var(--mono); font-size:11.5px; color:var(--sub); letter-spacing:.1em; text-transform:uppercase; display:flex; gap:12px}
  .tagline .no{color:var(--accent)}
  .info h2{font-family:var(--serif); font-weight:600; font-size:36px; line-height:1.1; letter-spacing:.01em; margin:14px 0 0}
  .info .host{font-family:var(--mono); font-size:12px; color:var(--sub); margin-top:8px}
  .info .desc{font-size:14.5px; color:#5f5a51; line-height:1.75; margin-top:16px; max-width:42ch}
  .info .desc::first-letter{font-family:var(--serif); font-size:2.8em; font-weight:600; float:left; line-height:.82; padding:6px 10px 0 0}
  .info .visit{display:inline-flex; gap:9px; margin-top:24px; font-family:var(--mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; padding:11px 20px; border:1px solid var(--ink); border-radius:2px; transition:background .2s,color .2s}
  .visit:hover{background:var(--ink); color:#fff}

  /* 作品集：美术馆画廊搁板 */
  .shelf{position:relative; margin:32px 0 4px}
  /* 左右各内缩 4.5% 对齐木板顶面（ltop 梯形 4.5%→95.5%），书不探出板沿 */
  .shelf-row{display:flex; align-items:flex-end; justify-content:center; position:relative; z-index:2; padding:0 4.5%}
  .ledge + .shelf-row{margin-top:46px}
  .art{position:relative; flex:0 0 auto; transition:transform .38s cubic-bezier(.2,.7,.3,1)}
  /* 光从右来：画框投影只打正左边、下方不投（坐在搁板上而非悬空） */
  .art .print{padding:9px; background:#fffdf8; border:1px solid rgba(52,42,26,.16); border-radius:2px;
              box-shadow:-9px 2px 14px -7px rgba(56,50,44,.20), -2px 1px 4px rgba(56,50,44,.11)}
  .art--sm .print{padding:6px; border-color:rgba(52,42,26,.10)}   /* 小图：边框/卡纸更细 */
  .art .frame{aspect-ratio:16/10}
  .art--side{width:30%}
  .art--feat{width:39%; z-index:5}
  /* 下方接触阴影已移除：画框坐在搁板上，下方不投影（只留左侧投影） */
  .ledge{position:relative; margin-top:-4px}
  .ledge .ltop{display:block; height:17px;
               background:linear-gradient(#e7d9bd,#eee3cb);
               clip-path:polygon(4.5% 0,95.5% 0,100% 100%,0 100%);
               box-shadow:inset 0 -1px 2px rgba(120,96,56,.10)}
  .ledge .lface{display:block; height:17px; border-radius:0 0 5px 5px;
                background:linear-gradient(#fdf6e6,#f5ecd6); border:1px solid rgba(82,64,36,.16); border-top:none;
                box-shadow:-4px 15px 22px -13px rgba(56,50,44,.22), inset 0 1px 0 rgba(255,255,255,.85)}
  .art:hover{transform:translateY(-11px) rotate(0deg); z-index:30}
  .art:hover .print{box-shadow:-15px 9px 30px -10px rgba(56,50,44,.26), -3px 3px 8px rgba(56,50,44,.13)}

  /* 品牌站：钉墙（每框一条倒 V 挂绳 + 朱砂图钉，落地页=招贴的体裁） */
  .wall{position:relative; margin:8px 0 84px; padding-top:36px}  /* 品牌站↔作品集 间距再加大 */
  .pin-row{display:flex; justify-content:center; align-items:flex-start; gap:6%; position:relative; z-index:2}
  .pin{position:relative; flex:0 0 auto; width:25%; transform-origin:top center;
       transition:transform .38s cubic-bezier(.2,.7,.3,1)}
  .pin--l{transform:rotate(-1.5deg)}
  .pin--r{transform:rotate(1.3deg)}
  /* 倒 V 挂绳：两端落在画框左上/右上角，折点顶在图钉上 */
